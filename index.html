// ── FILTER MULTI ──────────────────────────────────────────────────────────────
function FilterMulti({options, selected, onChange, placeholder}) {
  const [open,setOpen]=React.useState(false);
  const ref=React.useRef(null);
  React.useEffect(()=>{
    const fn=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",fn);
    return()=>document.removeEventListener("mousedown",fn);
  },[]);
  const allSel=selected.length===0;
  const label=allSel?placeholder:`${selected.length} sel.`;
  const toggle=v=>onChange(selected.includes(v)?selected.filter(x=>x!==v):[...selected,v]);
  return(
    <div ref={ref} style={{position:"relative",flexShrink:0}}>
      <button onClick={()=>setOpen(o=>!o)} className="filter-select" style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",background:!allSel?"var(--teal)":"",color:!allSel?"#fff":"",borderColor:!allSel?"var(--teal)":"",minWidth:130,justifyContent:"space-between"}}>
        <span>{label}</span>
        <span style={{fontSize:9,opacity:0.6}}>{open?"▲":"▼"}</span>
      </button>
      {open&&(
        <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,zIndex:200,background:"var(--white)",border:"1px solid var(--line)",borderRadius:8,boxShadow:"var(--shadow-lg)",minWidth:160,overflow:"hidden"}}>
          <div onClick={()=>onChange([])} style={{padding:"8px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:8,fontSize:12,background:allSel?"var(--bg)":"",fontWeight:allSel?600:400}}>
            <input type="checkbox" readOnly checked={allSel} style={{margin:0}}/> Todos
          </div>
          <div style={{height:1,background:"var(--line)"}}/>
          {options.map(o=>(
            <div key={o.val} onClick={()=>toggle(o.val)} style={{padding:"7px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:8,fontSize:12,background:selected.includes(o.val)?"var(--bg)":"",fontWeight:selected.includes(o.val)?600:400}}>
              <input type="checkbox" readOnly checked={selected.includes(o.val)} style={{margin:0}}/>
              {o.dot&&<span style={{width:8,height:8,borderRadius:"50%",background:o.dot,flexShrink:0}}/>}
              {o.label}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── MAIN APP ────────────────────────────────────────────────────────────────
function App({onSignOut, userEmail, accessToken}) {
  const [projects,setProjects]=useState([]);
  const [selId,setSelId]=useState(null);
  const [syncStatus,setSyncStatus]=useState("syncing");
  const [lastSync,setLastSync]=useState(null);
  const [loading,setLoading]=useState(true);
  const [showNewProj,setShowNewProj]=useState(false);
  const [showNewAct,setShowNewAct]=useState(false);
  const [showApplySipoc,setShowApplySipoc]=useState(false);
  const [showChangePw,setShowChangePw]=useState(false);
  const [changePwNew,setChangePwNew]=useState("");
  const [changePwConfirm,setChangePwConfirm]=useState("");
  const [changePwError,setChangePwError]=useState("");
  const [changePwLoading,setChangePwLoading]=useState(false);
  const [changePwSuccess,setChangePwSuccess]=useState(false);
  const [newProjName,setNewProjName]=useState("");
  const [newProjColor,setNewProjColor]=useState(COLORS[0]);
  const [newProjCity,setNewProjCity]=useState("");
  const [newProjCustomCity,setNewProjCustomCity]=useState("");
  const [newActName,setNewActName]=useState("");
  const [activeTab,setActiveTab]=useState("actividades");
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [showDashboard,setShowDashboard]=useState(false);
  const [globalSearch,setGlobalSearch]=useState("");
  const [showAudit,setShowAudit]=useState(false);
  const [auditLogs,setAuditLogs]=useState([]);
  const [auditUnread,setAuditUnread]=useState(0);
  const lastAuditTs=useRef(null);
  const [showGlobalResults,setShowGlobalResults]=useState(false);
  const [isMobile,setIsMobile]=useState(()=>window.innerWidth<=768);
  useEffect(()=>{
    const fn=()=>setIsMobile(window.innerWidth<=768);
    window.addEventListener("resize",fn);
    return()=>window.removeEventListener("resize",fn);
  },[]);

  // On mobile, null selId means "show project list"
  const mobileShowList = isMobile && !selId && !showDashboard;
  const mobileShowProject = isMobile && !!selId && !showDashboard;
  const [search,setSearch]=useState("");
  const [filterPrio,setFilterPrio]=useState([]);
  const [filterStatus,setFilterStatus]=useState([]);
  const [filterTipo,setFilterTipo]=useState([]);
  const saveTimer=useRef(null);
  const pollTimer=useRef(null);
  const lastServerUpdated=useRef(null);
  const pendingSave=useRef(false);
  const auditRef=useRef(null);
  const errorCount=useRef(0);
  const [fatalConnError,setFatalConnError]=useState(false);

  // Apply tipo from Excel lookup to any task missing it
  const applyTipoLookup=(projects)=>{
    const lk=window.TIPO_LOOKUP||{};
    return projects.map(p=>({...p,activities:(p.activities||[]).map(a=>({...a,tasks:a.tasks.map(t=>{
      if(t.tipo)return t;
      const key=`${p.name}||${a.name}||${t.tarea}`;
      return lk[key]?{...t,tipo:lk[key]}:t;
    })}))}));
  };

  const loadData=useCallback(async(silent=false)=>{
    if(!db)return;
    if(!silent)setSyncStatus("syncing");
    try {
      const rows=await db.select("planificador","id=eq.main");
      if(rows.length===0){
        const now=new Date().toISOString();
        await db.upsert("planificador",{id:"main",data:window.INITIAL_DATA,updated_at:now});
        lastServerUpdated.current=now;
        setProjects(applyTipoLookup(window.INITIAL_DATA));
      } else {
        const serverTime=rows[0].updated_at;
        const newData=rows[0].data;
        if(!silent){
          setProjects(applyTipoLookup(newData));
          lastServerUpdated.current=serverTime;
        } else if(!pendingSave.current&&serverTime!==lastServerUpdated.current){
          setProjects(applyTipoLookup(newData));
          lastServerUpdated.current=serverTime;
        }
      }
      errorCount.current=0;
      setSyncStatus("connected");
      setLastSync(new Date().toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"}));
    } catch(e){
      console.error(e);
      if(!silent)setSyncStatus("error");
      errorCount.current++;
      if(errorCount.current>=3)setFatalConnError(true);
    }
    setLoading(false);
  },[]);

  useEffect(()=>{
    if(!db){setLoading(false);return;}
    loadData();
    pollTimer.current=setInterval(()=>loadData(true),10000);
    return()=>clearInterval(pollTimer.current);
  },[loadData]);

  const saveProjects=useCallback((newProjects)=>{
    if(!db)return;
    clearTimeout(saveTimer.current);
    pendingSave.current=true;
    setSyncStatus("syncing");
    saveTimer.current=setTimeout(async()=>{
      try {
        const now=new Date().toISOString();
        await db.upsert("planificador",{id:"main",data:newProjects,updated_at:now});
        lastServerUpdated.current=now;
        pendingSave.current=false;
        setSyncStatus("connected");
        setLastSync(new Date().toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"}));
      } catch(e){console.error(e);pendingSave.current=false;setSyncStatus("error");errorCount.current++;if(errorCount.current>=3)setFatalConnError(true);}
    },1500);
  },[]);

  const updateProjects=p=>{setProjects(p);saveProjects(p);};

  const loadAuditLogs=useCallback(async()=>{
    if(!db)return;
    try{
      const rows=await db.select("audit_log","order=created_at.desc&limit=60");
      setAuditLogs(rows||[]);
    }catch(e){console.error("Audit load",e);}
  },[]);

  const logAudit=useCallback(async(actionType,description,projectName="")=>{
    if(!db)return;
    try{
      await db.insert("audit_log",{
        user_email:userEmail||"",
        user_name:emailToName(userEmail||""),
        project_name:projectName,
        action_type:actionType,
        description:description
      });
      setAuditUnread(n=>n+1);
      loadAuditLogs();
    }catch(e){console.error("Audit insert",e);}
  },[userEmail,loadAuditLogs]);

  useEffect(()=>{
    if(db){loadAuditLogs();}
    const t=setInterval(()=>{if(db)loadAuditLogs();},30000);
    return()=>clearInterval(t);
  },[loadAuditLogs]);

  const updActs=(pid,fn)=>updateProjects(projects.map(p=>p.id===pid?{...p,activities:fn(p.activities)}:p));
  const addProject=()=>{
    const city=(newProjCity==="otra"?newProjCustomCity:newProjCity).trim();
    if(!city||!newProjName.trim())return;
    const fullName=`${city} - ${newProjName.trim()}`;
    const p={id:uid(),name:fullName,color:newProjColor,activities:buildSipocActivities()};
    updateProjects([...projects,p]);setSelId(p.id);
    logAudit("nuevo_proyecto",`Nuevo proyecto creado: "${fullName}" (base SIPOC aplicada)`,fullName);
    setShowNewProj(false);setNewProjName("");setNewProjCity("");setNewProjCustomCity("");
  };
  const addActivity=()=>{
    if(!newActName.trim())return;
    updActs(selId,acts=>[...acts,{id:uid(),name:newActName.trim(),tasks:[]}]);
    setShowNewAct(false);setNewActName("");
  };
  const applySipoc=()=>{
    if(!selId)return;
    updActs(selId,()=>buildSipocActivities());
    const proj=projects.find(p=>p.id===selId);
    if(proj)logAudit("aplicar_sipoc",`SIPOC aplicado al proyecto: "${proj.name}" (actividades reemplazadas)`,proj.name);
    setShowApplySipoc(false);
  };
  const submitChangePw=async()=>{
    setChangePwError("");
    if(changePwNew.length<12){setChangePwError("La contraseña debe tener al menos 12 caracteres.");return;}
    if(changePwNew!==changePwConfirm){setChangePwError("Las contraseñas no coinciden.");return;}
    if(!accessToken){setChangePwError("Sesión inválida. Cierra sesión y vuelve a ingresar.");return;}
    setChangePwLoading(true);
    try{
      await db.updatePassword(accessToken,changePwNew);
      setChangePwSuccess(true);
      logAudit("cambio_password",`${userEmail} cambió su contraseña`,"");
    }catch(e){
      setChangePwError(e.message||"No se pudo actualizar la contraseña.");
    }
    setChangePwLoading(false);
  };
  const closeChangePw=()=>{setShowChangePw(false);setChangePwNew("");setChangePwConfirm("");setChangePwError("");setChangePwSuccess(false);};
  const deleteProject=(pid)=>{
    const remaining=projects.filter(p=>p.id!==pid);
    updateProjects(remaining);
    if(selId===pid)setSelId(remaining.length>0?remaining[0].id:null);
  };
  const archiveProject=(pid)=>{
    updateProjects(projects.map(p=>p.id===pid?{...p,archived:!p.archived}:p));
    // If the selected project is being archived, deselect it
    if(selId===pid){
      const p=projects.find(x=>x.id===pid);
      if(p&&!p.archived)setSelId(null); // it's currently active (about to be archived)
    }
  };
  const renameAct=(aid,name)=>updActs(selId,acts=>acts.map(a=>a.id===aid?{...a,name}:a));
  const deleteAct=(aid)=>updActs(selId,acts=>acts.filter(a=>a.id!==aid));
  const addTask=(aid,tarea)=>{
    const task={id:uid(),tarea,tipo:"",prioridad:3,informeSocio:false,estado:"Pendiente",responsable:"",duracion:"",fechaInicioE:today(),fechaTerminoE:"",fechaTerminoR:"",log:[]};
    updActs(selId,acts=>acts.map(a=>a.id===aid?{...a,tasks:[task,...a.tasks]}:a));
    const proj=projects.find(p=>p.id===selId);
    if(proj)logAudit("nueva_tarea",`Nueva tarea creada: "${tarea}"`,proj.name);
  };
  const updateTask=(aid,task,auditDesc="")=>{
    updActs(selId,acts=>acts.map(a=>a.id===aid?{...a,tasks:a.tasks.map(t=>t.id===task.id?task:t)}:a));
    const proj=projects.find(p=>p.id===selId);
    if(proj&&auditDesc)logAudit("tarea_modificada",auditDesc,proj.name);
  };
  const deleteTask=(aid,tid)=>updActs(selId,acts=>acts.map(a=>a.id===aid?{...a,tasks:a.tasks.filter(t=>t.id!==tid)}:a));

  const selProj=projects.find(p=>p.id===selId&&!p.archived);
  const allTasks=(selProj?.activities||[]).flatMap(a=>a.tasks);
  const stats=allTasks.reduce((acc,t)=>{acc[t.estado]=(acc[t.estado]||0)+1;return acc;},{});

  const filteredActs=(selProj?.activities||[]).map(a=>{
    const q=search.toLowerCase();
    const actMatch=!q||a.name.toLowerCase().includes(q);
    return {
      ...a,
      tasks:a.tasks.filter(t=>{
        const mS=actMatch||t.tarea.toLowerCase().includes(q)||(t.responsable||"").toLowerCase().includes(q)||(t.log||[]).some(l=>l.text.toLowerCase().includes(q));
        const mP=filterPrio.length===0||filterPrio.includes(String(normPrio(t.prioridad)));
        const mSt=filterStatus.length===0||filterStatus.includes(t.estado);
        const mTp=filterTipo.length===0||filterTipo.includes(t.tipo||"");
        return mS&&mP&&mSt&&mTp;
      })
    };
  }).filter(a=>a.tasks.length>0||(!(search||filterPrio.length||filterStatus.length||filterTipo.length)));

  if(fatalConnError)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16,padding:24,textAlign:"center"}}>
      <div style={{fontSize:40}}>🔌</div>
      <div style={{fontSize:20,fontWeight:700,color:"var(--red)"}}>Error de conexión</div>
      <div style={{color:"var(--ink2)",maxWidth:360}}>No se pudo conectar a la base de datos después de varios intentos. Por favor, desconéctate y vuelve a conectarte.</div>
      <button className="btn btn-primary" onClick={()=>{
        sessionStorage.removeItem("gl_session");
        window.location.reload();
      }}>Desconectar y reconectar</button>
    </div>
  );

  if(loading)return(
    <div className="loading-screen">
      <div className="spinner"/>
      <span style={{color:"var(--ink3)",fontSize:14}}>Cargando datos...</span>
    </div>
  );

  const syncLabel={connected:"Sincronizado ✓",syncing:"Guardando...",error:"Error de conexión"};

  return (
    <div className="app">
      <div className="sidebar">
        <div className="sidebar-brand" style={{padding:"10px 12px 0px"}}>

" alt="Guzmán & Larraín" style={{width:"100%",maxWidth:180,display:"block"}}/></div>
          <div style={{fontSize:10,color:"#5a5750",textTransform:"uppercase",letterSpacing:1.5,borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:8}}>Planificador de Proyectos</div>
        </div>
        <div className="sidebar-section">Proyectos — por ciudad</div>
        <CitySidebar projects={projects} selId={selId} onSelect={setSelId} onDeleteProject={deleteProject} onArchiveProject={archiveProject}/>
        <div className="sidebar-bottom">
          <button className="sidebar-btn sbtn-new" onClick={()=>setShowNewProj(true)}>+ Nuevo Proyecto</button>
          <button className="sidebar-btn sbtn-export" onClick={()=>exportCSV(projects.filter(p=>!p.archived))}>⬇ Exportar CSV</button>
          <button className="sidebar-btn sbtn-export" onClick={()=>{
            const blob=new Blob([JSON.stringify(projects,null,2)],{type:"application/json"});
            const a=document.createElement("a");
            a.href=URL.createObjectURL(blob);
            a.download=`backup_GL_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
          }}>💾 Backup JSON</button>
          <div style={{borderTop:"1px solid rgba(255,255,255,0.07)",marginTop:8,paddingTop:8,display:"flex",alignItems:"center",justifyContent:"space-between",gap:6}}>
            <span style={{fontSize:10,color:"#5a5750",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}} title={userEmail}>👤 {userEmail}</span>
            <button className="signout-btn" onClick={()=>setShowChangePw(true)} title="Cambiar contraseña" style={{padding:"5px 9px"}}>🔑</button>
            <button className="signout-btn" onClick={onSignOut} title="Cerrar sesión">Salir</button>
          </div>
        </div>
        <div className="sync-bar">
          <span className={`sync-dot ${syncStatus}`}/>
          <span className="sync-text">{syncLabel[syncStatus]||"—"}</span>
          {lastSync&&<span className="sync-time">{lastSync}</span>}
        </div>
      </div>

      <div className="main">
        <div className="global-nav">
          <button className={"global-nav-btn"+(showDashboard?" active":"")} onClick={()=>{setShowDashboard(true);if(!isMobile)setSelId(null);}}>📊 Dashboard</button>
          <button className={"global-nav-btn"+(!showDashboard?" active":"")} onClick={()=>setShowDashboard(false)}>{selProj?`📋 ${selProj.name.split(" - ").slice(1).join(" - ")||selProj.name}`:"📋 Proyectos"}</button>
          <div className="global-search-wrap">
            <div className="global-search-box">
              <span className="global-search-icon">🔍</span>
              <input className="global-search-inp" placeholder="Buscar en todos los proyectos..." value={globalSearch}
                onChange={e=>{setGlobalSearch(e.target.value);setShowGlobalResults(e.target.value.length>1);}}
                onBlur={()=>setTimeout(()=>setShowGlobalResults(false),200)}
                onFocus={()=>globalSearch.length>1&&setShowGlobalResults(true)}/>
              {showGlobalResults&&globalSearch.length>1&&(()=>{
                const q=globalSearch.toLowerCase();
                const results=projects.flatMap(p=>(p.activities||[]).flatMap(a=>a.tasks
                  .filter(t=>t.tarea.toLowerCase().includes(q)||(t.responsable||"").toLowerCase().includes(q))
                  .map(t=>({...t,projName:p.name,projId:p.id,actName:a.name}))
                )).slice(0,10);
                if(results.length===0)return<div className="global-results"><div style={{padding:14,color:"var(--ink3)",fontSize:12,textAlign:"center"}}>Sin resultados</div></div>;
                return(
                  <div className="global-results">
                    {results.map((r,i)=>(
                      <div key={i} className="global-result-item" onMouseDown={()=>{setSelId(r.projId);setShowDashboard(false);setGlobalSearch("");setShowGlobalResults(false);}}>
                        <div className="global-result-proj">{r.projName}</div>
                        <div className="global-result-task">{r.tarea}</div>
                        <div className="global-result-act">{r.actName} · {r.responsable||"Sin asignar"}</div>
                        <span className="global-result-status" style={{background:{"Completado":"var(--green-lt)","En Proceso":"var(--teal-lt)","Pendiente":"var(--gray-lt)","Bloqueado":"var(--red-lt)"}[r.estado]||"var(--gray-lt)",color:{"Completado":"var(--green)","En Proceso":"var(--teal)","Pendiente":"var(--ink3)","Bloqueado":"var(--red)"}[r.estado]||"var(--ink3)"}}>{r.estado}</span>
                      </div>
                    ))}
                  </div>
                );
              })()}
            </div>
            <button className="btn btn-outline btn-sm" onClick={()=>exportPDF(projects.filter(p=>!p.archived))} title="Exportar reporte PDF">📄 PDF</button>
            <div className="audit-bell-wrap" ref={auditRef}>
              <button className="audit-bell-btn" onClick={()=>{setShowAudit(s=>!s);setAuditUnread(0);}} title="Historial de cambios">
                🔔
                {auditUnread>0&&<span className="audit-badge">{auditUnread>99?"99+":auditUnread}</span>}
              </button>
              {showAudit&&(
                <div className="audit-panel">
                  <div className="audit-panel-head">
                    <h4>🔔 Historial de cambios</h4>
                    <button className="btn btn-ghost btn-xs" onClick={()=>setShowAudit(false)}>✕</button>
                  </div>
                  <div className="audit-list">
                    {auditLogs.length===0?(
                      <div className="audit-empty">Sin cambios registrados aún.</div>
                    ):auditLogs.map((e,i)=>{
                      const dt=new Date(e.created_at);
                      const when=isNaN(dt)?"—":dt.toLocaleString("es-CL",{day:"2-digit",month:"2-digit",year:"2-digit",hour:"2-digit",minute:"2-digit"});
                      return(
                        <div key={e.id||i} className="audit-entry">
                          <div className="audit-entry-who">
                            <span className="audit-who-name">👤 {e.user_name||e.user_email||"Usuario"}</span>
                            <span className="audit-when">{when}</span>
                          </div>
                          {e.project_name&&<div className="audit-entry-proj">📁 {e.project_name.split(" - ").slice(1).join(" - ")||e.project_name}</div>}
                          <div className="audit-entry-desc">{e.description}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
        <div className="topbar">
          <div className="topbar-left" style={{flexWrap:"wrap",rowGap:4}}>

            {mobileShowProject&&<button className="mobile-back-btn" onClick={()=>setSelId(null)}>← Proyectos</button>}
            {selProj&&<span style={{width:9,height:9,borderRadius:"50%",background:selProj.color,display:"inline-block",flexShrink:0}}/>}
            <h2>{selProj?selProj.name:isMobile?"Planificador":"Selecciona un proyecto"}</h2>
            {selProj&&(()=>{
              const done=allTasks.filter(t=>t.estado==="Completado").length;
              const pct=allTasks.length>0?Math.round(done/allTasks.length*100):0;
              const fillColor=pct===100?"var(--green)":pct>=50?"var(--teal)":"var(--amber)";
              const now=new Date().toISOString().slice(0,10);
              const overdue=allTasks
                .filter(t=>t.estado!=="Completado"&&t.fechaTerminoE&&t.fechaTerminoE<now)
                .sort((a,b)=>a.fechaTerminoE.localeCompare(b.fechaTerminoE))[0];
              return(<>
                <span className="badge-proj">{allTasks.length} tareas</span>
                <span className="badge-progress" title={`${done} de ${allTasks.length} tareas completadas`}>
                  <div className="badge-progress-bar"><div className="badge-progress-fill" style={{width:pct+"%",background:fillColor}}/></div>
                  {pct}% avance
                </span>
                {overdue&&null}
              </>);
            })()}
          </div>
          <div className="topbar-actions">
            {selProj&&(
              <>
                <div className="stat-pills">
                  {stats["Completado"]>0&&<span style={{color:"var(--green)",fontWeight:600,fontSize:12}}>{stats["Completado"]} ✓</span>}
                  {stats["Pendiente"]>0&&<span style={{color:"var(--ink3)",fontWeight:600,fontSize:12}}>{stats["Pendiente"]} pendientes</span>}
                </div>
                <button className="btn btn-outline btn-sm" onClick={()=>setShowApplySipoc(true)} title="Reemplaza todas las actividades con la plantilla SIPOC">🔄 Aplicar SIPOC</button>
                <button className="btn btn-primary btn-sm" onClick={()=>setShowNewAct(true)}>+ Nueva Actividad</button>
              </>
            )}
          </div>
        </div>

          {showDashboard?(
            <DashboardView projects={projects.filter(p=>!p.archived)} onSelectProject={id=>{setSelId(id);setShowDashboard(false);setActiveTab("actividades");}}/>
          ):isMobile&&mobileShowList?(
            <>
              <div className="mobile-proj-list">
                <MobileProjectList projects={projects.filter(p=>!p.archived)} onSelect={id=>{setSelId(id);setActiveTab("actividades");}}/>
              </div>
            </>
          ):!selProj?(
            <div className="empty-state">
              <div className="empty-icon">🏗️</div>
              <h3>Sin proyecto seleccionado</h3>
              <p>Elige un proyecto del menú lateral</p>
            </div>
          ):(
            <>
              <div className="proj-tabs">
                <button className={"proj-tab"+(activeTab==="actividades"?" active":"")} onClick={()=>setActiveTab("actividades")}>📋 Actividades</button>
                <button className={"proj-tab proj-tab-timeline"+(activeTab==="timeline"?" active":"")} onClick={()=>setActiveTab("timeline")}>📅 Línea de Tiempo</button>
                <button className={"proj-tab"+(activeTab==="informe"?" active":"")} onClick={()=>setActiveTab("informe")}>📄 Informe</button>
              </div>
              {activeTab==="actividades"&&(
                <>
                  {allTasks.length>0&&(
                    <div className="filter-bar">
                      <div className="search-wrap">
                        <span className="search-icon">🔍</span>
                        <input className="search-inp" placeholder="Buscar actividad, tarea, responsable o nota..." value={search} onChange={e=>setSearch(e.target.value)}/>
                      </div>
                      <FilterMulti
                        placeholder="Todas las prioridades"
                        options={[{val:"1",label:"1 — Alta"},{val:"2",label:"2 — Media"},{val:"3",label:"3 — Baja"}]}
                        selected={filterPrio} onChange={setFilterPrio}
                      />
                      <FilterMulti
                        placeholder="Todos los estados"
                        options={STATUS_OPTS.map(s=>({val:s,label:s}))}
                        selected={filterStatus} onChange={setFilterStatus}
                      />
                      <FilterMulti
                        placeholder="T / R"
                        options={[{val:"T",label:"T — Tarea",dot:"#1a7a4a"},{val:"R",label:"R — Restricción",dot:"#c0392b"},{val:"",label:"Sin tipo"}]}
                        selected={filterTipo} onChange={setFilterTipo}
                      />
                      {(search||filterPrio.length||filterStatus.length||filterTipo.length)&&(
                        <button className="btn btn-ghost btn-sm" onClick={()=>{setSearch("");setFilterPrio([]);setFilterStatus([]);setFilterTipo([]);}}>✕ Limpiar</button>
                      )}
                    </div>
                  )}
                  {(()=>{
                    const out=[];let lastSec=null;
                    filteredActs.forEach((a,ai)=>{
                      const m=a.name.match(/^([A-E])-\d+/);
                      const sec=m?m[1]:null;
                      if(sec&&sec!==lastSec&&SIPOC_SECTIONS[sec]){
                        out.push(<div key={`sec-${sec}`} className="sipoc-section-header"><span className="sipoc-section-letter">{sec}</span><span className="sipoc-section-title">{SIPOC_SECTIONS[sec]}</span></div>);
                        lastSec=sec;
                      }
                      out.push(<ActivityGroup key={a.id} activity={a} actIdx={ai+1} onUpdateTask={updateTask} onDeleteTask={deleteTask} onAddTask={addTask} onRenameAct={renameAct} onDeleteAct={deleteAct} startIdx={1} onAuditLog={logAudit} currentUserName={emailToName(userEmail)}/>);
                    });
                    return out;
                  })()}
                </>
              )}
              {activeTab==="timeline"&&(
                <TimelineView project={selProj}/>
              )}
              {activeTab==="informe"&&(
                <InformeView project={selProj}/>
              )}
            </>
          )}
        </div>
      </div>

      {showNewProj&&(()=>{
        const existingCities=[...new Set(projects.map(p=>p.name.split(" - ")[0].trim()))].sort();
        const canCreate=(newProjCity==="otra"?newProjCustomCity.trim():newProjCity.trim())&&newProjName.trim();
        return(
        <Modal title="Nuevo Proyecto" onClose={()=>{setShowNewProj(false);setNewProjCity("");setNewProjCustomCity("");setNewProjName("");}} footer={<>
          <button className="btn btn-outline" onClick={()=>{setShowNewProj(false);setNewProjCity("");setNewProjCustomCity("");setNewProjName("");}}>Cancelar</button>
          <button className="btn btn-primary" onClick={addProject} disabled={!canCreate}>Crear</button>
        </>}>
          <div className="field"><label>Ciudad</label>
            <select value={newProjCity} onChange={e=>setNewProjCity(e.target.value)} style={{background:"var(--bg)",border:"1px solid var(--line)",borderRadius:7,padding:"9px 12px",fontSize:13,color:"var(--ink)",outline:"none"}}>
              <option value="">— Selecciona una ciudad —</option>
              {existingCities.map(c=><option key={c} value={c}>{c}</option>)}
              <option value="otra">+ Otra ciudad...</option>
            </select>
          </div>
          {newProjCity==="otra"&&(
            <div className="field"><label>Nombre de la ciudad</label>
              <input autoFocus value={newProjCustomCity} onChange={e=>setNewProjCustomCity(e.target.value)} placeholder="Ej: Valparaíso"/>
            </div>
          )}
          <div className="field"><label>Nombre del Proyecto</label>
            <input autoFocus={newProjCity!=="otra"} value={newProjName} onChange={e=>setNewProjName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&canCreate&&addProject()} placeholder="Ej: Las Lilas, Torre Norte..."/>
            {(newProjCity&&newProjName)&&<div style={{fontSize:11,color:"var(--ink3)",marginTop:3}}>Se creará como: <strong style={{color:"var(--ink2)"}}>{(newProjCity==="otra"?newProjCustomCity:newProjCity)} - {newProjName}</strong></div>}
          </div>
          <div className="field"><label>Color</label>
            <div className="color-opts">{COLORS.map(c=><button key={c} className={`color-dot-btn${newProjColor===c?" sel":""}`} style={{background:c}} onClick={()=>setNewProjColor(c)}/>)}</div>
          </div>
        </Modal>
        );
      })()}
      {showNewAct&&(
        <Modal title="Nueva Actividad" onClose={()=>setShowNewAct(false)} footer={<>
          <button className="btn btn-outline" onClick={()=>setShowNewAct(false)}>Cancelar</button>
          <button className="btn btn-primary" onClick={addActivity} disabled={!newActName.trim()}>Crear</button>
        </>}>
          <div className="field"><label>Nombre de la Actividad</label>
            <input autoFocus value={newActName} onChange={e=>setNewActName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addActivity()} placeholder="Ej: Proyecto Sanitario"/>
          </div>
        </Modal>
      )}
      {showApplySipoc&&selProj&&(
        <Modal title="Aplicar SIPOC" onClose={()=>setShowApplySipoc(false)} footer={<>
          <button className="btn btn-outline" onClick={()=>setShowApplySipoc(false)}>Cancelar</button>
          <button className="btn btn-primary" style={{background:"var(--red)",borderColor:"var(--red)"}} onClick={applySipoc}>Aplicar SIPOC y reemplazar</button>
        </>}>
          <div style={{fontSize:13.5,color:"var(--ink2)",lineHeight:1.5}}>
            <p style={{marginBottom:10}}>Estás por aplicar la plantilla <strong>SIPOC</strong> al proyecto <strong style={{color:"var(--ink)"}}>{selProj.name}</strong>.</p>
            <p style={{marginBottom:10,padding:"10px 12px",background:"var(--red-lt)",border:"1px solid var(--red)",borderRadius:7,color:"var(--red)"}}>
              ⚠ Esto <strong>borrará todas las actividades, tareas, restricciones y bitácoras</strong> del proyecto y las reemplazará con las del SIPOC. Esta acción no se puede deshacer.
            </p>
            <p style={{fontSize:12,color:"var(--ink3)"}}>Se preservan: nombre del proyecto, ciudad y color. Solo se reemplazan las actividades.</p>
          </div>
        </Modal>
      )}
      {showChangePw&&(
        <Modal title="Cambiar contraseña" onClose={closeChangePw} footer={changePwSuccess?<>
          <button className="btn btn-primary" onClick={closeChangePw}>Listo</button>
        </>:<>
          <button className="btn btn-outline" onClick={closeChangePw}>Cancelar</button>
          <button className="btn btn-primary" onClick={submitChangePw} disabled={changePwLoading||!changePwNew||!changePwConfirm}>{changePwLoading?"Guardando...":"Guardar"}</button>
        </>}>
          {changePwSuccess?(
            <div style={{textAlign:"center",padding:"10px 0"}}>
              <div style={{fontSize:38,marginBottom:8}}>✅</div>
              <div style={{fontSize:14,fontWeight:700,color:"var(--ink)",marginBottom:6}}>Contraseña actualizada</div>
              <div style={{fontSize:12.5,color:"var(--ink2)",lineHeight:1.5}}>Tu nueva contraseña ya está activa. Guárdala en un lugar seguro.</div>
            </div>
          ):(
            <div>
              <div style={{fontSize:12.5,color:"var(--ink2)",marginBottom:12,lineHeight:1.5}}>
                Elige una contraseña nueva y única, que no uses en otros servicios.
              </div>
              <div className="field"><label>Nueva contraseña</label>
                <input type="password" autoFocus value={changePwNew} onChange={e=>{setChangePwNew(e.target.value);setChangePwError("");}}
                  onKeyDown={e=>e.key==="Enter"&&document.getElementById("cpw-confirm")?.focus()}
                  placeholder="Mínimo 12 caracteres"/>
              </div>
              <div className="field"><label>Confirmar contraseña</label>
                <input id="cpw-confirm" type="password" value={changePwConfirm} onChange={e=>{setChangePwConfirm(e.target.value);setChangePwError("");}}
                  onKeyDown={e=>e.key==="Enter"&&submitChangePw()}
                  placeholder="Repite la contraseña"/>
              </div>
              <div style={{fontSize:11,color:"var(--ink3)",lineHeight:1.45,marginTop:-4}}>
                Usa 12+ caracteres, con mayúsculas, minúsculas, números y símbolos.
              </div>
              {changePwError&&<div style={{marginTop:10,padding:"8px 11px",background:"var(--red-lt)",color:"var(--red)",border:"1px solid var(--red)",borderRadius:7,fontSize:12.5,fontWeight:600}}>{changePwError}</div>}
            </div>
          )}
        </Modal>
      )}
    </div>
  );
}

    const u = localStorage.getItem("pl_url");
    const k = localStorage.getItem("pl_key");
    if(!u||!k) { setError("Primero configura las credenciales de Supabase."); return; }
    if(!email.trim()||!password) { setError("Ingresa tu email y contraseña."); return; }
    setLoading(true); setError("");

      const client = new SupabaseClient(u, k);
      const session = await client.signIn(email.trim().toLowerCase(), password);
      const token = session.access_token;
      const userData = { email: session.user?.email, token, expires: session.expires_at };
      sessionStorage.setItem("gl_session", JSON.stringify(userData));
      onLogin(userData);

      setError(e.message || "Correo o contraseña incorrectos");

function ResetPasswordScreen({accessToken, onDone}) {
  const [pw, setPw] = useState("");
  const [pw2, setPw2] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [done, setDone] = useState(false);

  const handleSubmit = async () => {
    setError("");
    if(pw.length<12){ setError("La contraseña debe tener al menos 12 caracteres."); return; }
    if(pw!==pw2){ setError("Las contraseñas no coinciden."); return; }
    setLoading(true);
    try {
      const u = localStorage.getItem("pl_url");
      const k = localStorage.getItem("pl_key");
      const client = new SupabaseClient(u, k);
      await client.updatePassword(accessToken, pw);
      setDone(true);
      // Clear recovery tokens from URL hash so it can't be reused
      history.replaceState(null, "", window.location.pathname+window.location.search);
    } catch(e) {
      setError(e.message || "No se pudo actualizar la contraseña");
    }
    setLoading(false);
  };

  if(done) return (
    <div className="login-screen">
      <div className="login-card">
        <div style={{textAlign:"center",padding:"10px 0"}}>
          <div style={{fontSize:44,marginBottom:10}}>✅</div>
          <div style={{fontSize:17,fontWeight:700,color:"var(--ink)",marginBottom:10,fontFamily:"'Libre Baskerville',serif"}}>Contraseña actualizada</div>
          <div style={{fontSize:13,color:"var(--ink2)",lineHeight:1.55,marginBottom:18}}>
            Tu contraseña fue cambiada correctamente. Ahora puedes ingresar con la nueva.
          </div>
          <button className="login-btn" onClick={onDone}>Ir al login →</button>
        </div>
      </div>
    </div>
  );

  return(
    <div className="login-screen">
      <div className="login-card">
        <div className="login-title">Nueva contraseña</div>
        <div className="login-sub" style={{marginBottom:20}}>Establece tu contraseña nueva</div>
        <div>
          <label className="login-label">Nueva contraseña</label>
          <input autoFocus className={"login-input"+(error?" error":"")} type="password"
            placeholder="Mínimo 12 caracteres"
            value={pw} onChange={e=>{setPw(e.target.value);setError("")}}
            onKeyDown={e=>e.key==="Enter"&&document.getElementById("pw2-field")?.focus()}
            disabled={loading}/>
          <label className="login-label">Confirmar contraseña</label>
          <input id="pw2-field" className={"login-input"+(error?" error":"")} type="password"
            placeholder="Repite la contraseña"
            value={pw2} onChange={e=>{setPw2(e.target.value);setError("")}}
            onKeyDown={e=>e.key==="Enter"&&handleSubmit()}
            disabled={loading}/>
          <div style={{fontSize:11,color:"var(--ink3)",marginTop:-6,marginBottom:10,lineHeight:1.4}}>
            Usa 12+ caracteres, con mayúsculas, minúsculas, números y símbolos.
          </div>
          <button className="login-btn" onClick={handleSubmit} disabled={loading}>
            {loading?"Guardando...":"Actualizar contraseña →"}
          </button>
          <div className="login-error">{error}</div>
        </div>
        <div className="login-footer">
          Guzmán &amp; Larraín Empresas
        </div>
      </div>
    </div>
  );
}

function parseRecoveryHash() {
  const h = window.location.hash;
  if(!h||h.length<2) return null;
  const p = new URLSearchParams(h.slice(1));
  if(p.get("type")==="recovery" && p.get("access_token")) return {accessToken:p.get("access_token")};
  return null;
}

function Root() {
  // Hardcoded credentials — no setup screen needed
  const SUPA_URL = "https://jjphjrnvdjpchcekmqad.supabase.co";
  const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpqcGhqcm52ZGpwY2hjZWttcWFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNjk4MDMsImV4cCI6MjA4ODc0NTgwM30.b4yjMjfsdHYCrF-UK1Gzbjszm420I1WYjE4hjOid90M";

  const [recoveryToken, setRecoveryToken] = useState(() => parseRecoveryHash()?.accessToken || null);

  const [session, setSession] = useState(()=>{
    try { return JSON.parse(sessionStorage.getItem("gl_session")||"null"); } catch{ return null; }
  });
  const [ready, setReady] = useState(false);

  useEffect(()=>{
    // Always use hardcoded credentials, also persist to localStorage for reconnect logic
    localStorage.setItem("pl_url", SUPA_URL);
    localStorage.setItem("pl_key", SUPA_KEY);
    db = new SupabaseClient(SUPA_URL, SUPA_KEY);
    if(session?.token) db.setAuthToken(session.token);
    setReady(true);
  },[session]);

  const handleSetup=(u,k)=>{db=new SupabaseClient(u,k);setReady(true);};

  const handleLogin=(userData)=>{
    setSession(userData);
    if(db) db.setAuthToken(userData.token);
  };

  const handleSignOut=async()=>{
    try{ if(db&&session?.token) await db.signOut(session.token); }catch(e){}
    sessionStorage.removeItem("gl_session");
    setSession(null);
  };

  // Not yet configured with Supabase credentials
  if(!ready && !localStorage.getItem("pl_url")) return <SetupScreen onSetup={handleSetup}/>;
  // User arrived from a password recovery email — show reset screen (takes priority over existing session)
  if(recoveryToken) return <ResetPasswordScreen accessToken={recoveryToken} onDone={()=>{
    sessionStorage.removeItem("gl_session");
    setSession(null);
    setRecoveryToken(null);
  }}/>;
  // Credentials exist but not logged in
  if(!session) return <LoginScreen onLogin={handleLogin}/>;
  // Need to setup db first
  if(!ready) return <SetupScreen onSetup={handleSetup}/>;
  return <App onSignOut={handleSignOut} userEmail={session.email} accessToken={session.token}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
