const sipocTaskTpl = (tarea,tipo) => ({id:uid(),tarea,tipo,prioridad:3,informeSocio:false,estado:"Pendiente",responsable:"",duracion:"",fechaInicioE:"",fechaTerminoE:"",fechaTerminoR:"",log:[]});
const buildSipocActivities = () => SIPOC_TEMPLATE.map(a => ({
  id: uid(),
  name: `${a.code} ${a.name}`,
  tasks: [
    ...a.tareas.map(t => sipocTaskTpl(t,"T")),
    ...a.restricciones.map(r => sipocTaskTpl(r,"R"))
  ]
}));

const getCity = name => name.split(" - ")[0].trim();
const getShortName = name => { const parts = name.split(" - "); return parts.length > 1 ? parts.slice(1).join(" - ") : name; };
const normPrio = p => (p>=1 && p<=3) ? p : 3;

function exportCSV(projects) {
  const rows=[["Ciudad","Proyecto","Actividad","N°","Tarea/Restricción","Última nota","Prioridad","Estado","Responsable","Duración","Fecha Inicio E","Fecha Término E","Fecha Término R","Informe Socios"]];
  let n=1;
  for(const p of projects) for(const a of p.activities) for(const t of a.tasks){
    const last=t.log&&t.log.length>0?t.log[t.log.length-1]:null;
    rows.push([getCity(p.name),getShortName(p.name),a.name,n++,t.tarea,last?`${last.date}: ${last.text}`:"",t.prioridad,t.estado,t.responsable||"",t.duracion||"",t.fechaInicioE||"",t.fechaTerminoE||"",t.fechaTerminoR||"",t.informeSocio?"Sí":"No"]);
  }
  const csv=rows.map(r=>r.map(c=>`"${String(c??"").replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="planificador.csv";a.click();URL.revokeObjectURL(url);
}

// ── SETUP ──────────────────────────────────────────────────────────────────
function SetupScreen({onSetup}) {
  const [url,setUrl]=useState("");
  const [key,setKey]=useState("");
  const [testing,setTesting]=useState(false);
  const [error,setError]=useState("");
  const handleConnect = async () => {
    const u=url.trim().replace(/\/$/, "");
    const k=key.trim();
    if(!u||!k){setError("Debes ingresar la URL y la Key.");return;}
    if(!u.startsWith("https://")){setError("La URL debe empezar con https://");return;}
    if(!k.startsWith("eyJ")){setError("La Anon Key debe empezar con eyJ...");return;}
    setTesting(true);setError("");
    try {
      const client=new SupabaseClient(u,k);
      await client.test();
      localStorage.setItem("pl_url",u);
      localStorage.setItem("pl_key",k);
      onSetup(u,k);
    } catch(e){setError("⚠️ "+e.message);}
    setTesting(false);
  };
  return (
    <div className="setup-screen">
      <div className="setup-card">
        <h2>Conectar Base de Datos</h2>
        <p className="setup-sub">Ingresa tus credenciales de Supabase para activar la sincronización en tiempo real.</p>
        <div className="setup-steps">
          <div className="setup-step"><div className="step-num">1</div><div className="step-text">Supabase → <code>Project Settings</code> → <code>Data API</code></div></div>
          <div className="setup-step"><div className="step-num">2</div><div className="step-text">Copia la <strong>Project URL</strong></div></div>
          <div className="setup-step"><div className="step-num">3</div><div className="step-text">En <code>API Keys</code> → copia la key <strong>anon</strong> (empieza con eyJ...)</div></div>
        </div>
        {error&&<div className="setup-error">{error}</div>}
        <div className="setup-field">
          <label>Project URL</label>
          <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://xxxxxxxxxxxx.supabase.co" onKeyDown={e=>e.key==="Enter"&&handleConnect()}/>
        </div>
        <div className="setup-field">
          <label>Anon Key</label>
          <input value={key} onChange={e=>setKey(e.target.value)} placeholder="eyJhbGci..." onKeyDown={e=>e.key==="Enter"&&handleConnect()}/>
        </div>
        <button className="btn btn-primary" style={{width:"100%",justifyContent:"center",padding:"11px",marginTop:4}} onClick={handleConnect} disabled={testing}>
          {testing?"⏳ Conectando...":"✓ Conectar y Guardar"}
        </button>
        <p style={{fontSize:11,color:"var(--ink3)",marginTop:12,textAlign:"center"}}>Las credenciales se guardan solo en tu navegador.</p>
      </div>
    </div>
  );
}

// ── CITY SIDEBAR ────────────────────────────────────────────────────────────
function CitySidebar({projects, selId, onSelect, onDeleteProject, onArchiveProject}) {
  const activeProjects = projects.filter(p => !p.archived);
  const archivedProjects = projects.filter(p => p.archived);
  const firstCity = activeProjects.length > 0 ? getCity(activeProjects[0].name) : null;
  const [openCities, setOpenCities] = useState(() => {
    const init = {};
    if(firstCity) init[firstCity] = true;
    return init;
  });
  const [showArchived, setShowArchived] = useState(false);

  // Auto-open city of selected project
  useEffect(() => {
    if(!selId) return;
    const p = projects.find(p => p.id === selId);
    if(!p) return;
    const city = getCity(p.name);
    setOpenCities(prev => ({...prev, [city]: true}));
  }, [selId]);

  // Group by city, preserve order (active only)
  const cityMap = {};
  const cityOrder = [];
  for(const p of activeProjects) {
    const city = getCity(p.name);
    if(!cityMap[city]) { cityMap[city] = []; cityOrder.push(city); }
    cityMap[city].push(p);
  }

  const toggle = city => setOpenCities(prev => ({...prev, [city]: !prev[city]}));

  const renderProjItem = (p, isArchived) => (
    <div key={p.id} className={`proj-item${selId===p.id?" active":""}`}
      style={isArchived?{opacity:0.5}:{}}
      onClick={() => onSelect(p.id)}>
      <span className="proj-dot" style={{background:p.color}}/>
      <span className="proj-name">{getShortName(p.name)}</span>
      <span className="proj-count">{p.activities.reduce((s,a)=>s+a.tasks.length,0)}</span>
      <button onClick={e=>{e.stopPropagation();onArchiveProject(p.id);}}
        style={{background:"none",border:"none",color:"transparent",cursor:"pointer",fontSize:10,padding:"1px 3px",borderRadius:3,lineHeight:1,flexShrink:0,transition:"color 0.13s"}}
        className="proj-arch-btn" title={isArchived?"Desarchivar":"Archivar proyecto"}>📦</button>
      <button onClick={e=>{e.stopPropagation();if(confirm(`¿Eliminar "${p.name}" y todas sus actividades?`))onDeleteProject(p.id);}}
        style={{background:"none",border:"none",color:"transparent",cursor:"pointer",fontSize:11,padding:"1px 3px",borderRadius:3,lineHeight:1,flexShrink:0,transition:"color 0.13s"}}
        className="proj-del-btn">🗑</button>
    </div>
  );

  return (
    <div className="proj-list">
      {cityOrder.map(city => {
        const projs = cityMap[city];
        const isOpen = !!openCities[city];
        const hasActive = projs.some(p => p.id === selId);
        return (
          <div key={city} className="city-group">
            <div className="city-header" onClick={() => toggle(city)}>
              <span className={`city-arrow${isOpen?" open":""}`}>▶</span>
              <span className="city-name" style={hasActive?{color:"#a0c8d0"}:{}}>{city}</span>
              <span className="city-count">{projs.length}</span>
            </div>
            {isOpen && (
              <div className="city-projects">
                {projs.map(p => renderProjItem(p, false))}
              </div>
            )}
          </div>
        );
      })}
      {archivedProjects.length > 0 && (
        <div style={{marginTop:6,borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:4}}>
          <button onClick={()=>setShowArchived(s=>!s)}
            style={{width:"100%",padding:"6px 8px",background:"none",border:"none",color:"#5a5750",fontSize:9,textAlign:"left",cursor:"pointer",display:"flex",alignItems:"center",gap:6,textTransform:"uppercase",letterSpacing:1.5}}>
            <span style={{transition:"transform 0.2s",display:"inline-block",transform:showArchived?"rotate(90deg)":"rotate(0deg)"}}>▶</span>
            Archivados ({archivedProjects.length})
          </button>
          {showArchived && (
            <div style={{paddingLeft:8,borderLeft:"1px solid rgba(255,255,255,0.06)",marginLeft:10}}>
              {archivedProjects.map(p => renderProjItem(p, true))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── TASK ROW ────────────────────────────────────────────────────────────────
function TaskRow({task,actId,onUpdate,onDelete,globalIdx,onAuditLog,currentUserName}) {
  const [open,setOpen]=useState(false);
  const [form,setForm]=useState({...task,log:task.log||[]});
  const [newLogDate,setNewLogDate]=useState(today());
  const [newLogText,setNewLogText]=useState("");
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const [saveError,setSaveError]=useState("");
  const saveAndClose=()=>{
    const missing=[];
    if(!form.responsable)missing.push("Responsable");
    if(!form.tipo)missing.push("Tipo");
    if(form.tipo!=="R"&&!form.duracion&&!form.fechaTerminoE)missing.push("Duración o Fecha Término");
    if(!form.fechaInicioE)missing.push("Fecha Inicio");
    if(missing.length>0){setSaveError("Campos obligatorios: "+missing.join(", "));return;}
    setSaveError("");
    // Build audit description
    const changes=[];
    if(form.tarea!==task.tarea)changes.push(`nombre: "${form.tarea}"`);
    if(form.responsable!==task.responsable)changes.push(`responsable: ${form.responsable}`);
    if(form.estado!==task.estado)changes.push(`estado: ${form.estado}`);
    if(form.fechaTerminoR!==task.fechaTerminoR&&form.fechaTerminoR)changes.push(`fecha término real: ${form.fechaTerminoR}`);
    if(form.fechaInicioE!==task.fechaInicioE)changes.push(`fecha inicio: ${form.fechaInicioE}`);
    if(form.tipo!==task.tipo&&form.tipo)changes.push(`tipo: ${form.tipo==="T"?"Tarea":"Restricción"}`);
    const auditDesc=`Tarea "${form.tarea}"${changes.length?" — "+changes.join(", "):""}`;
    onUpdate(actId,{...form},auditDesc);
    if(onAuditLog&&changes.length>0)onAuditLog("tarea_modificada",auditDesc);
    setOpen(false);
  };
  const addLog=()=>{
    if(!newLogText.trim())return;
    const logEntry={id:uid(),date:newLogDate,text:newLogText.trim()};
    setForm(f=>({...f,log:[...f.log,logEntry]}));
    if(onAuditLog)onAuditLog("bitacora",`Bitácora en "${task.tarea}": "${newLogText.trim().slice(0,80)}${newLogText.trim().length>80?"...":""}"`);
    setNewLogText("");
  };
  const delLog=lid=>setForm(f=>({...f,log:f.log.filter(l=>l.id!==lid)}));
  const [editingLogId,setEditingLogId]=useState(null);
  const [editLogText,setEditLogText]=useState("");
  const startEditLog=(l)=>{setEditingLogId(l.id);setEditLogText(l.text);};
  const saveEditLog=()=>setForm(f=>({...f,log:f.log.map(l=>l.id===editingLogId?{...l,text:editLogText}:l)}))|| setEditingLogId(null);
  const cancelEditLog=()=>setEditingLogId(null);
  const lastLog=form.log.length>0?form.log[form.log.length-1]:null;
  const overdue=isOverdue(task.fechaTerminoE)&&task.estado!=="Completado";
  const handleQuickComplete=(e)=>{
    e.stopPropagation();
    const t=today();
    const name=(currentUserName||"").trim();
    const completed={
      ...task,
      responsable:name||task.responsable,
      fechaInicioE:t,
      fechaTerminoE:t,
      fechaTerminoR:t,
      duracion:"0",
      estado:"Completado",
    };
    const desc=`Tarea "${task.tarea}" completada rápido por ${name||"usuario"} (${t})`;
    onUpdate(actId,completed,desc);
    if(onAuditLog)onAuditLog("tarea_completada",desc);
    setForm(completed);
  };
  return (
    <div className="task-row-wrap">
      <div className={`task-row${open?" expanded":""}`} onClick={()=>setOpen(o=>!o)}>
        <div className="td td-num">{globalIdx}</div>
        <div className="td">
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            {task.tipo&&<span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:18,height:18,borderRadius:"50%",fontSize:10,fontWeight:800,flexShrink:0,background:task.tipo==="T"?"rgba(26,122,74,0.12)":"rgba(192,57,43,0.12)",color:task.tipo==="T"?"#1a7a4a":"#c0392b",border:`1.5px solid ${task.tipo==="T"?"#1a7a4a":"#c0392b"}`}}>{task.tipo}</span>}
            <div className="task-name">{task.tarea}</div>
            {(!task.responsable||!task.tipo||(task.tipo!=="R"&&!task.duracion&&!task.fechaTerminoE)||!task.fechaInicioE)&&(
              <span title={`Info incompleta: ${[!task.responsable?"responsable":null,!task.tipo?"tipo":null,(task.tipo!=="R"&&!task.duracion&&!task.fechaTerminoE)?"duración o fecha término":null,!task.fechaInicioE?"fecha inicio":null].filter(Boolean).join(", ")}`}
                style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:10,fontWeight:700,color:"#c0392b",background:"rgba(192,57,43,0.1)",border:"1px solid rgba(192,57,43,0.25)",borderRadius:4,padding:"1px 5px",flexShrink:0,whiteSpace:"nowrap"}}>
                ⚠ Incompleta
              </span>
            )}
          </div>
          {lastLog&&<div className="task-desc-preview">{fmtDate(lastLog.date)} — {lastLog.text}</div>}
        </div>
        <div className="td" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
          <span className={`prio-badge prio-${normPrio(task.prioridad)}`}>{normPrio(task.prioridad)}</span>
          {task.estado!=="Completado"&&(
            <button onClick={handleQuickComplete} className="complete-btn" title="Completar rápido: fechas = hoy, responsable = tú, estado = Completado">✓</button>
          )}
        </div>
        <div className="td"><span className={`status-chip ${STATUS_CLASS[task.estado]||"s-pending"}`}>{task.estado}</span></div>
        <div className="td td-date"><div className="date-label">Inicio</div>{fmtDate(task.fechaInicioE)}</div>
        <div className="td td-date"><div className="date-label">Término</div><span className={overdue?"date-overdue":""}>{fmtDate(task.fechaTerminoE)}</span></div>
        <div className="td"><span style={{fontSize:12,color:"var(--ink2)"}}>{task.responsable||"—"}</span></div>
        <div className="td" style={{textAlign:"center"}}>{task.informeSocio&&<span title="Informe Socios" style={{fontSize:13,background:"rgba(var(--teal-rgb,20,160,180),0.15)",color:"var(--teal)",borderRadius:4,padding:"1px 6px",fontSize:11,fontWeight:600}}>📋 IS</span>}</div>
      </div>
      {open&&(
        <div className="task-detail" onClick={e=>e.stopPropagation()}>
          <div className="detail-grid">
            <div className="detail-field" style={{gridColumn:"1/-1"}}>
              <div className="detail-label">Tarea / Restricción</div>
              <input className="detail-input" value={form.tarea} onChange={e=>set("tarea",e.target.value)}/>
            </div>
            <div className="detail-field">
              <div className="detail-label" style={{color:!form.responsable?"var(--red)":"var(--ink3)"}}>Responsable {!form.responsable&&<span style={{fontSize:9,fontWeight:700,color:"var(--red)"}}>*</span>}</div>
              <select className="detail-input" value={form.responsable||""} onChange={e=>set("responsable",e.target.value)}>
                <option value="">— Sin asignar —</option>
                {RESPONSABLES.map(r=><option key={r} value={r}>{r}</option>)}
              </select>
            </div>
            <div className="detail-field">
              <div className="detail-label">Prioridad</div>
              <select className="detail-input" value={normPrio(form.prioridad)} onChange={e=>set("prioridad",Number(e.target.value))}>
                <option value={1}>1 — Alta</option><option value={2}>2 — Media</option>
                <option value={3}>3 — Baja</option>
              </select>
            </div>
            <div className="detail-field">
              <div className="detail-label">Estado</div>
              <select className="detail-input" value={form.estado} onChange={e=>set("estado",e.target.value)}>
                {STATUS_OPTS.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div className="detail-field">
              <div className="detail-label" style={{color:!form.tipo?"var(--red)":"var(--ink3)"}}>Tipo {!form.tipo&&<span style={{fontSize:9,fontWeight:700}}>*</span>}</div>
              <select className="detail-input" value={form.tipo||""} onChange={e=>set("tipo",e.target.value)} style={{borderColor:!form.tipo?"var(--red)":""}}>
                <option value="">— Sin clasificar —</option>
                <option value="T">T — Tarea</option>
                <option value="R">R — Restricción</option>
              </select>
            </div>
            {form.tipo!=="R"&&(
            <div className="detail-field">
              <div className="detail-label" style={{color:(!form.duracion&&!form.fechaTerminoE)?"var(--red)":"var(--ink3)"}}>Duración (días) {(!form.duracion&&!form.fechaTerminoE)&&<span style={{fontSize:9,fontWeight:700,color:"var(--red)"}}>*</span>}</div>
              <input className="detail-input" type="number" min="0" value={form.duracion||""} onChange={e=>{
                const v=e.target.value;
                setForm(f=>{
                  const dur=parseInt(v);
                  const newEnd=(f.fechaInicioE&&dur>=0)?new Date(new Date(f.fechaInicioE).getTime()+dur*86400000).toISOString().slice(0,10):"";
                  return {...f,duracion:v,...(newEnd?{fechaTerminoE:newEnd}:{})};
                });
              }}/>
            </div>
            )}
            <div className="detail-field">
              <div className="detail-label" style={{color:!form.fechaInicioE?"var(--red)":"var(--ink3)"}}>Fecha Inicio (E) {!form.fechaInicioE&&<span style={{fontSize:9,fontWeight:700,color:"var(--red)"}}>*</span>}</div>
              <input className="detail-input" type="date" value={form.fechaInicioE||""} onChange={e=>{
                const v=e.target.value;
                setForm(f=>{
                  const dur=parseInt(f.duracion);
                  if(v&&dur>=0){
                    const newEnd=new Date(new Date(v).getTime()+dur*86400000).toISOString().slice(0,10);
                    return {...f,fechaInicioE:v,fechaTerminoE:newEnd};
                  }
                  if(v&&f.fechaTerminoE){
                    const newDur=Math.max(0,Math.round((new Date(f.fechaTerminoE)-new Date(v))/86400000));
                    return {...f,fechaInicioE:v,duracion:String(newDur)};
                  }
                  return {...f,fechaInicioE:v};
                });
              }}/>
            </div>
            {form.tipo!=="R"&&(
            <div className="detail-field">
              <div className="detail-label" style={{color:(!form.duracion&&!form.fechaTerminoE)?"var(--red)":"var(--ink3)"}}>Fecha Término (E) {(!form.duracion&&!form.fechaTerminoE)&&<span style={{fontSize:9,fontWeight:700,color:"var(--red)"}}>*</span>}</div>
              <input className="detail-input" type="date" value={form.fechaTerminoE||""} onChange={e=>{
                const v=e.target.value;
                setForm(f=>{
                  if(v&&f.fechaInicioE){
                    const newDur=Math.max(0,Math.round((new Date(v)-new Date(f.fechaInicioE))/86400000));
                    return {...f,fechaTerminoE:v,duracion:String(newDur)};
                  }
                  return {...f,fechaTerminoE:v};
                });
              }}/>
            </div>
            )}
            <div className="detail-field">
              <div className="detail-label">Fecha Término Real</div>
              <input className="detail-input" type="date" value={form.fechaTerminoR||""} onChange={e=>{const v=e.target.value;setForm(f=>({...f,fechaTerminoR:v,...(v&&f.estado!=="Completado"?{estado:"Completado"}:{})}));}}/>
            </div>
            <div className="detail-field" style={{gridColumn:"1/-1"}}>
              <label style={{display:"flex",alignItems:"center",gap:9,cursor:"pointer",userSelect:"none"}}>
                <input type="checkbox" checked={!!form.informeSocio} onChange={e=>set("informeSocio",e.target.checked)}
                  style={{width:16,height:16,accentColor:"var(--teal)",cursor:"pointer",flexShrink:0}}/>
                <span style={{fontSize:13,fontWeight:600,color:"var(--ink)"}}>📋 Informe Socios</span>
                <span style={{fontSize:11,color:"var(--ink3)",fontStyle:"italic"}}>— incluir en reporte a socios</span>
              </label>
            </div>

          </div>
          <div style={{height:1,background:"var(--line)",margin:"12px 0"}}/>
          <div className="log-section-title">Bitácora de Avance</div>
          {form.log.length===0&&<p style={{fontSize:12,color:"var(--ink3)",marginBottom:10}}>Sin entradas aún.</p>}
          {[...form.log].reverse().map(l=>(
            <div className="log-entry" key={l.id}>
              <div className="log-date">{fmtDate(l.date)}</div>
              {editingLogId===l.id?(
                <div className="log-editing">
                  <textarea className="log-edit-inp" value={editLogText} onChange={e=>setEditLogText(e.target.value)} autoFocus onKeyDown={e=>{if(e.key==="Escape")cancelEditLog();if(e.key==="Enter"&&e.ctrlKey){setForm(f=>({...f,log:f.log.map(ll=>ll.id===l.id?{...ll,text:editLogText}:ll)}));setEditingLogId(null);}}}/>
                  <div className="log-edit-actions">
                    <button className="btn btn-ghost btn-sm" onClick={cancelEditLog}>Cancelar</button>
                    <button className="btn btn-primary btn-sm" onClick={()=>{setForm(f=>({...f,log:f.log.map(ll=>ll.id===l.id?{...ll,text:editLogText}:ll)}));setEditingLogId(null);}}>Guardar</button>
                  </div>
                </div>
              ):(
                <div className="log-text">{l.text}</div>
              )}
              <div style={{display:"flex",flexDirection:"column",gap:3,flexShrink:0}}>
                <button className="log-edit" title="Editar nota" onClick={()=>startEditLog(l)}>✏</button>
                <button className="log-del" title="Eliminar nota" onClick={()=>delLog(l.id)}>✕</button>
              </div>
            </div>
          ))}
          <div className="log-add-row">
            <input type="date" className="log-date-inp" value={newLogDate} onChange={e=>setNewLogDate(e.target.value)}/>
            <textarea className="log-text-inp" placeholder="Agregar nota... (Ctrl+Enter)" value={newLogText} onChange={e=>setNewLogText(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&e.ctrlKey)addLog();}}/>
            <button className="btn btn-primary btn-sm" style={{alignSelf:"flex-end",flexShrink:0}} onClick={addLog}>+ Agregar</button>
          </div>
          <div className="detail-actions" style={{flexDirection:"column",gap:8}}>
            {saveError&&<div style={{background:"var(--red-lt)",border:"1px solid rgba(192,57,43,0.2)",borderRadius:6,padding:"7px 11px",fontSize:12,color:"var(--red)",width:"100%"}}>{saveError}</div>}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%"}}>
              <button className="btn btn-danger btn-sm" onClick={()=>{if(confirm("¿Eliminar esta tarea?"))onDelete(actId,task.id);}}>🗑 Eliminar</button>
              <div style={{display:"flex",gap:7}}>
                <button className="btn btn-outline btn-sm" onClick={()=>{setForm({...task,log:task.log||[]});setOpen(false);setSaveError("");}}>Cancelar</button>
                <button className="btn btn-primary btn-sm" onClick={saveAndClose}>Guardar cambios</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── ACTIVITY GROUP ──────────────────────────────────────────────────────────
function ActivityGroup({activity,actIdx,onUpdateTask,onDeleteTask,onAddTask,onRenameAct,onDeleteAct,startIdx,onAuditLog,currentUserName}) {
  const [collapsed,setCollapsed]=useState(true);
  const [addingTask,setAddingTask]=useState(false);
  const [newTaskName,setNewTaskName]=useState("");
  const [editingName,setEditingName]=useState(false);
  const [nameVal,setNameVal]=useState(activity.name);
  const confirmAdd=()=>{
    if(!newTaskName.trim())return setAddingTask(false);
    onAddTask(activity.id,newTaskName.trim());
    setNewTaskName("");setAddingTask(false);
  };
  const confirmRename=()=>{if(nameVal.trim())onRenameAct(activity.id,nameVal.trim());setEditingName(false);};
  return (
    <div className="activity-group">
      <div className="activity-header" onClick={()=>!editingName&&setCollapsed(c=>!c)}>
        <span style={{color:"#888",fontSize:10,transform:collapsed?"":"rotate(90deg)",transition:"transform 0.2s",display:"inline-block"}}>▶</span>
        {actIdx&&<span style={{fontSize:11,color:"#666",background:"rgba(255,255,255,0.08)",borderRadius:4,padding:"1px 7px",flexShrink:0,fontFamily:"monospace"}}>{actIdx}</span>}
        {editingName?(
          <input value={nameVal} onChange={e=>setNameVal(e.target.value)} onBlur={confirmRename}
            onKeyDown={e=>{if(e.key==="Enter")confirmRename();}} onClick={e=>e.stopPropagation()}
            style={{background:"rgba(255,255,255,0.11)",border:"1px solid rgba(255,255,255,0.25)",borderRadius:4,padding:"3px 8px",color:"#fff",fontSize:13.5,fontFamily:"serif",flex:1,outline:"none"}} autoFocus/>
        ):<h3>{activity.name}</h3>}
        <span className="activity-count">{activity.tasks.length} tarea{activity.tasks.length!==1?"s":""}</span>
        <div className="act-actions" onClick={e=>e.stopPropagation()}>
          <button className="act-icon-btn" onClick={()=>{setEditingName(true);setCollapsed(false);}}>✏️</button>
          <button className="act-icon-btn" onClick={()=>{setAddingTask(true);setCollapsed(false);}}>+</button>
          <button className="act-icon-btn del" onClick={()=>{if(confirm(`¿Eliminar "${activity.name}"?`))onDeleteAct(activity.id);}}>🗑</button>
        </div>
      </div>
      {!collapsed&&(
        <>
          <div className="tasks-table-head">
            <div className="th" style={{textAlign:"center"}}>#</div>
            <div className="th">Tarea / Restricción</div>
            <div className="th" style={{textAlign:"center"}}>Prior.</div>
            <div className="th">Estado</div>
            <div className="th">Inicio</div>
            <div className="th">Término Est.</div>
            <div className="th">Responsable</div>
            <div className="th" style={{textAlign:"center"}}>IS</div>
          </div>
          {activity.tasks.length===0&&<div style={{padding:"14px 18px",color:"var(--ink3)",fontSize:13,fontStyle:"italic"}}>Sin tareas.</div>}
          {activity.tasks.map((task,i)=>(
            <TaskRow key={task.id} task={task} actId={activity.id} onUpdate={onUpdateTask} onDelete={onDeleteTask} globalIdx={startIdx+i} onAuditLog={onAuditLog} currentUserName={currentUserName}/>
          ))}
          {addingTask?(
            <div className="add-task-row">
              <input autoFocus className="add-task-inp" placeholder="Nombre de la tarea..." value={newTaskName}
                onChange={e=>setNewTaskName(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")confirmAdd();if(e.key==="Escape")setAddingTask(false);}}/>
              <button className="btn btn-primary btn-xs" onClick={confirmAdd}>Agregar</button>
              <button className="btn btn-outline btn-xs" onClick={()=>setAddingTask(false)}>✕</button>
            </div>
          ):(
            <div className="add-task-row" onClick={()=>setAddingTask(true)}>
              <span style={{color:"var(--ink3)",fontSize:12}}>+ Agregar tarea</span>
            </div>
          )}
        </>
      )}
    </div>
  );
}

function Modal({title,onClose,children,footer}) {
  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-head"><h3>{title}</h3><button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button></div>
        <div className="modal-body">{children}</div>
        {footer&&<div className="modal-foot">{footer}</div>}
      </div>
    </div>
  );
}


// ── TIMELINE VIEW ────────────────────────────────────────────────────────────
const STATUS_COLOR_TL = {
  "Completado":"#27ae60",
  "En Proceso":"#17a2b8",
  "Pendiente":"#888",
  "Bloqueado":"#e74c3c",
  "Pausado":"#f39c12",
};
const MONTH_NAMES = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

function parseDate(s){if(!s||s.length<8)return null;try{const d=new Date(s);return isNaN(d)?null:d;}catch{return null;}}
function datePx(date,startMs,totalMs,totalPx){
  return Math.max(0,Math.min(totalPx,((date.getTime()-startMs)/totalMs)*totalPx));
}

function TimelineView({project}){
  const [tooltip,setTooltip]=useState(null);
  const [expanded,setExpanded]=useState({});
  const containerRef=useRef(null);

  // Collect all valid dates from all tasks
  const allDates=[];
  (project.activities||[]).forEach(a=>(a.tasks||[]).forEach(t=>{
    [t.fechaInicioE,t.fechaTerminoE,t.fechaTerminoR].forEach(d=>{const p=parseDate(d);if(p)allDates.push(p);});
  }));

  if(allDates.length===0)return <div className="tl-no-dates">Sin fechas registradas en este proyecto.</div>;

  const minDate=new Date(Math.min(...allDates.map(d=>d.getTime())));
  const maxDate=new Date(Math.max(...allDates.map(d=>d.getTime())));
  // Pad 1 month on each side
  const startDate=new Date(minDate.getFullYear(),minDate.getMonth()-1,1);
  const endDate=new Date(maxDate.getFullYear(),maxDate.getMonth()+2,1);
  const today=new Date();
  const totalMs=endDate.getTime()-startDate.getTime();

  // Build list of months for axis
  const months=[];
  let cur=new Date(startDate);
  while(cur<endDate){
    months.push({year:cur.getFullYear(),month:cur.getMonth()});
    cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);
  }

  // Activity status aggregation
  function actStatus(act){
    const tasks=act.tasks||[];
    if(tasks.length===0)return "Pendiente";
    if(tasks.every(t=>t.estado==="Completado"))return "Completado";
    if(tasks.some(t=>t.estado==="Bloqueado"))return "Bloqueado";
    if(tasks.some(t=>t.estado==="En Proceso"))return "En Proceso";
    return "Pendiente";
  }

  const toggleExpand=(aid)=>setExpanded(e=>({...e,[aid]:!e[aid]}));

  // Group months by year for axis
  const years=[];
  months.forEach(m=>{
    const last=years[years.length-1];
    if(!last||last.year!==m.year){years.push({year:m.year,count:1});}
    else{last.count++;}
  });

  return(
    <div className="tl-wrap">
      <div className="tl-header">
        <h3>📅 Línea de Tiempo — {project.name}</h3>
        <div className="tl-legend">
          {Object.entries(STATUS_COLOR_TL).map(([s,c])=>(
            <div key={s} className="tl-legend-item">
              <div className="tl-legend-dot" style={{background:c}}/>
              <span>{s}</span>
            </div>
          ))}
          <div className="tl-legend-item"><div className="tl-legend-dot" style={{background:"rgba(255,120,50,0.8)",borderRadius:"50%"}}/><span>Hoy</span></div>
        </div>
      </div>
      {tooltip&&(
        <div className="tl-tooltip" style={{top:tooltip.y+10,left:tooltip.x+10}}>
          <div className="tl-tooltip-title">{tooltip.name}</div>
          {tooltip.resp&&<div>👤 {tooltip.resp}</div>}
          {tooltip.start&&<div>📅 Inicio: {tooltip.start}</div>}
          {tooltip.end&&<div>🏁 Término E: {tooltip.end}</div>}
          {tooltip.real&&<div>✅ Término R: {tooltip.real}</div>}
          <div style={{marginTop:4}}><span style={{background:STATUS_COLOR_TL[tooltip.status]||"#888",color:"#fff",borderRadius:3,padding:"1px 7px",fontSize:11}}>{tooltip.status}</span></div>
        </div>
      )}
      <div className="tl-scroll" ref={containerRef}>
        <div className="tl-table">
          {/* Year axis */}
          <div className="tl-year-row">
            <div className="tl-act-label" style={{borderRight:"1px solid var(--line)"}}>Actividad</div>
            <div style={{flex:1,display:"flex"}}>
              {years.map(y=>(
                <div key={y.year} className="tl-year-cell" style={{flex:y.count}}>
                  {y.year}
                </div>
              ))}
            </div>
          </div>
          {/* Month axis */}
          <div className="tl-axis-row" style={{position:"sticky",top:28,zIndex:9}}>
            <div className="tl-act-label"/>
            <div className="tl-months">
              {months.map((m,i)=>(
                <div key={i} className={"tl-month"+(m.year===today.getFullYear()&&m.month===today.getMonth()?" current-month":"")}>
                  {MONTH_NAMES[m.month]}
                </div>
              ))}
            </div>
          </div>

          {/* Activity rows */}
          {(project.activities||[]).map((act,ai)=>{
            // Get date range for this activity
            const actDates=[];
            (act.tasks||[]).forEach(t=>{
              [t.fechaInicioE,t.fechaTerminoE,t.fechaTerminoR].forEach(d=>{const p=parseDate(d);if(p)actDates.push(p);});
            });
            const hasDates=actDates.length>0;
            const actStart=hasDates?new Date(Math.min(...actDates.map(d=>d.getTime()))):null;
            const actEnd=hasDates?new Date(Math.max(...actDates.map(d=>d.getTime()))):null;
            const status=actStatus(act);
            const color=STATUS_COLOR_TL[status]||"#888";
            const isExp=!!expanded[act.id];

            return(
              <React.Fragment key={act.id}>
                <div className="tl-activity-row">
                  <div className="tl-act-name" onClick={()=>act.tasks.length>0&&toggleExpand(act.id)}>
                    {act.tasks.length>0&&<span className="tl-act-toggle">{isExp?"▼":"▶"}</span>}
                    <div>
                      <div className="tl-act-name-text">{ai+1}. {act.name}</div>
                      <div className="tl-act-name-tasks">{act.tasks.length} tarea{act.tasks.length!==1?"s":""} · {status}</div>
                    </div>
                  </div>
                  <div className="tl-bars" style={{overflow:"visible"}}>
                    {/* Today line */}
                    {today>=startDate&&today<=endDate&&(
                      <div className="tl-today-line" style={{left:`${(today.getTime()-startDate.getTime())/totalMs*100}%`}}/>
                    )}
                    {/* Background grid lines per month */}
                    {months.map((m,mi)=>(
                      <div key={mi} style={{position:"absolute",left:`${(new Date(m.year,m.month,1).getTime()-startDate.getTime())/totalMs*100}%`,top:0,bottom:0,width:"1px",background:"rgba(255,255,255,0.04)"}}/>
                    ))}
                    {hasDates&&(
                      <div
                        className="tl-bar"
                        style={{
                          left:`${(actStart.getTime()-startDate.getTime())/totalMs*100}%`,
                          width:`${Math.max(0.5,(actEnd.getTime()-actStart.getTime())/totalMs*100)}%`,
                          background:color,
                          opacity:status==="Completado"?0.7:1,
                        }}
                        onMouseMove={e=>setTooltip({
                          x:e.clientX,y:e.clientY,
                          name:act.name,
                          start:actStart.toLocaleDateString("es-CL"),
                          end:actEnd.toLocaleDateString("es-CL"),
                          status,
                        })}
                        onMouseLeave={()=>setTooltip(null)}
                      >
                        <span className="tl-bar-label">{act.name}</span>
                      </div>
                    )}
                    {!hasDates&&<div className="tl-empty-range">Sin fechas</div>}
                  </div>
                </div>
                {/* Expanded task rows */}
                {isExp&&(act.tasks||[]).map((task,ti)=>{
                  const tStart=parseDate(task.fechaInicioE);
                  const tEnd=parseDate(task.fechaTerminoE)||tStart;
                  const tReal=parseDate(task.fechaTerminoR);
                  const tColor=STATUS_COLOR_TL[task.estado]||"#888";
                  return(
                    <div key={task.id} className="tl-task-row">
                      <div className="tl-task-name">
                        <span style={{color:tColor,fontSize:8}}>●</span>
                        <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={task.tarea}>{task.tarea}</span>
                        {task.informeSocio&&<span title="Informe Socios" style={{fontSize:9,color:"var(--teal)",fontWeight:700,flexShrink:0}}>📋</span>}
                      </div>
                      <div className="tl-task-bars" style={{overflow:"visible"}}>
                        {today>=startDate&&today<=endDate&&(
                          <div style={{position:"absolute",top:0,bottom:0,width:"1px",background:"rgba(255,120,50,0.5)",left:`${(today.getTime()-startDate.getTime())/totalMs*100}%`}}/>
                        )}
                        {tStart&&(
                          <>
                            {/* Estimated bar */}
                            <div
                              className="tl-bar-task"
                              style={{
                                left:`${(tStart.getTime()-startDate.getTime())/totalMs*100}%`,
                                width:`${Math.max(0.3,(((tEnd||tStart).getTime()-tStart.getTime())/totalMs)*100)}%`,
                                background:tColor,
                                top:"50%",transform:"translateY(-50%)",
                              }}
                              onMouseMove={e=>setTooltip({
                                x:e.clientX,y:e.clientY,
                                name:task.tarea,
                                resp:task.responsable,
                                start:tStart.toLocaleDateString("es-CL"),
                                end:tEnd?tEnd.toLocaleDateString("es-CL"):null,
                                real:tReal?tReal.toLocaleDateString("es-CL"):null,
                                status:task.estado,
                              })}
                              onMouseLeave={()=>setTooltip(null)}
                            />
                            {/* Real end marker */}
                            {tReal&&(
                              <div style={{
                                position:"absolute",
                                left:`${(tReal.getTime()-startDate.getTime())/totalMs*100}%`,
                                top:"50%",transform:"translateY(-50%) translateX(-50%)",
                                width:8,height:8,borderRadius:"50%",
                                background:"#27ae60",border:"2px solid #fff",zIndex:5,
                              }}/>
                            )}
                          </>
                        )}
                      </div>
                    </div>
                  );
                })}
              </React.Fragment>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── DASHBOARD VIEW ──────────────────────────────────────────────────────────
function MultiSelect({options, selected, onChange, placeholder}) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(()=>{
    const fn=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",fn);
    return()=>document.removeEventListener("mousedown",fn);
  },[]);
  const allSelected=selected.length===0;
  const label=allSelected?placeholder:`${selected.length} seleccionado${selected.length>1?"s":""}`;
  const toggle=val=>onChange(selected.includes(val)?selected.filter(v=>v!==val):[...selected,val]);
  return(
    <div className="multiselect-wrap" ref={ref}>
      <button className={"multiselect-btn"+(open?" open":"")} onClick={()=>setOpen(o=>!o)}>
        <span style={{flex:1,textAlign:"left"}}>{label}</span>
        <span style={{fontSize:9,opacity:0.5}}>{open?"▲":"▼"}</span>
      </button>
      {open&&(
        <div className="multiselect-dropdown">
          <div className="multiselect-item" onClick={()=>onChange([])}>
            <input type="checkbox" readOnly checked={allSelected}/> Todos los proyectos
          </div>
          <div className="multiselect-sep"/>
          {options.map(o=>(
            <div key={o.id} className={"multiselect-item"+(selected.includes(o.id)?" checked":"")} onClick={()=>toggle(o.id)}>
              <input type="checkbox" readOnly checked={selected.includes(o.id)}/>
              <span style={{width:8,height:8,borderRadius:"50%",background:o.color,display:"inline-block",flexShrink:0}}/>
              <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.label}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function DonutChart({data}) {
  const total=data.reduce((s,d)=>s+d.val,0);
  if(total===0)return<div style={{textAlign:"center",color:"var(--ink3)",padding:20}}>Sin datos</div>;
  const r=60,cx=75,cy=75,circ=2*Math.PI*r;
  let offset=0;
  const segments=data.map(d=>{
    const pct=d.val/total;
    const seg={...d,pct,dashArray:`${pct*circ} ${circ}`,offset};
    offset+=pct*circ;
    return seg;
  }).filter(d=>d.val>0);
  return(
    <div className="dash-donut-wrap">
      <svg width="150" height="150" viewBox="0 0 150 150">
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--line)" strokeWidth="22"/>
        {segments.map((s,i)=>(
          <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth="22"
            strokeDasharray={s.dashArray} strokeDashoffset={-s.offset}
            transform={`rotate(-90 ${cx} ${cy})`}/>
        ))}
        <text x={cx} y={cy-6} textAnchor="middle" fontSize="18" fontWeight="700" fill="var(--ink)">{total}</text>
        <text x={cx} y={cy+10} textAnchor="middle" fontSize="9" fill="var(--ink3)">TAREAS</text>
      </svg>
      <div className="dash-legend">
        {data.filter(d=>d.val>0).map((d,i)=>(
          <div key={i} className="dash-legend-item">
            <div className="dash-legend-dot" style={{background:d.color}}/>
            <span>{d.label}</span>
            <span className="dash-legend-val">{d.val}</span>
            <span style={{color:"var(--ink3)",fontSize:10}}>({total>0?Math.round(d.val/total*100):0}%)</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function InformeView({project}) {
  const [soloIS, setSoloIS] = useState(false);
  const [filterResp, setFilterResp] = useState([]);
  const [filterTipo, setFilterTipo] = useState([]);
  const [filterStatus, setFilterStatus] = useState(["Pendiente"]);
  const today=new Date().toISOString().slice(0,10);
  const threeWeeksAgo=new Date();threeWeeksAgo.setDate(threeWeeksAgo.getDate()-21);
  const threeWeeksAgoStr=threeWeeksAgo.toISOString().slice(0,10);

  const allTasksRaw=(project.activities||[]).flatMap(a=>a.tasks.map(t=>({...t,actName:a.name})));
  const allResponsables=[...new Set(allTasksRaw.map(t=>t.responsable).filter(Boolean))].sort();

  const filt=t=>{
    const p=normPrio(t.prioridad);
    if(p!==1&&p!==2)return false;
    if(soloIS&&!t.informeSocio)return false;
    if(filterResp.length>0&&!filterResp.includes(t.responsable))return false;
    if(filterTipo.length>0&&!filterTipo.includes(t.tipo||""))return false;
    if(filterStatus.length>0&&!filterStatus.includes(t.estado))return false;
    return true;
  };
  const allTasks=allTasksRaw.filter(filt);

  const atrasadas=allTasks.filter(t=>t.estado!=="Completado"&&t.fechaTerminoE&&t.fechaTerminoE<today)
    .sort((a,b)=>a.fechaTerminoE.localeCompare(b.fechaTerminoE));
  const enCurso=allTasks.filter(t=>t.estado==="En Proceso")
    .sort((a,b)=>(a.fechaTerminoE||"").localeCompare(b.fechaTerminoE||""));
  const pendientes=allTasks.filter(t=>t.estado==="Pendiente"&&!(t.fechaTerminoE&&t.fechaTerminoE<today))
    .sort((a,b)=>(a.fechaTerminoE||"zzz").localeCompare(b.fechaTerminoE||"zzz"));
  const recientes=allTasks.filter(t=>t.estado==="Completado"&&(filterStatus.length>0||( t.fechaTerminoR&&t.fechaTerminoR>=threeWeeksAgoStr)))
    .sort((a,b)=>(b.fechaTerminoR||"").localeCompare(a.fechaTerminoR||""));

  const done=allTasks.filter(t=>t.estado==="Completado").length;
  const total=allTasks.length;
  const pct=total>0?Math.round(done/total*100):0;
  const pctColor=pct===100?"var(--green)":pct>=50?project.color:"var(--amber)";

  const fmtDate=d=>{if(!d||d.length<8)return"—";const[y,m,day]=d.split("-");return`${day}/${m}/${y.slice(2)}`;};
  const lastLog=t=>t.log&&t.log.length>0?t.log[t.log.length-1]:null;
  const daysDiff=d=>{const diff=Math.floor((new Date(today)-new Date(d))/864e5);return diff===0?"hoy":diff===1?"1 día":diff+" días";};
  const dateStr=new Date().toLocaleDateString("es-CL",{weekday:"long",year:"numeric",month:"long",day:"numeric"});

  function TaskCard({t,accentColor}) {
    const [showAllLogs,setShowAllLogs]=React.useState(false);
    const log=lastLog(t);
    const hasMultipleLogs=t.log&&t.log.length>1;
    const logsToShow=showAllLogs?[...t.log].reverse():(log?[log]:[]);
    return(
      <div className="inf-task-card" style={{borderLeftColor:accentColor}}>
        <div className="inf-task-act">{t.actName}</div>
        <div className="inf-task-name">{t.tarea}</div>
        <div className="inf-task-meta">
          {t.responsable&&<span className="inf-task-resp">👤 {t.responsable}</span>}
          {t.fechaTerminoE&&<span className="inf-task-date">📅 Término E: {fmtDate(t.fechaTerminoE)}</span>}
          {t.fechaTerminoR&&<span className="inf-task-date">✅ Completado: {fmtDate(t.fechaTerminoR)}</span>}
          {t.informeSocio&&<span className="inf-task-badge" style={{background:"rgba(26,95,110,0.12)",color:"var(--teal)"}}>📋 IS</span>}
        </div>
        {logsToShow.map((l,i)=>(
          <div key={i} className="inf-task-note" style={i>0?{marginTop:4,opacity:0.85}:{}}>
            {l.date&&<div className="inf-task-note-date">{fmtDate(l.date)}</div>}
            <div>{l.text}</div>
          </div>
        ))}
        {hasMultipleLogs&&(
          <button onClick={e=>{e.stopPropagation();setShowAllLogs(v=>!v);}}
            style={{marginTop:5,background:"none",border:"none",cursor:"pointer",fontSize:11,color:"var(--teal)",fontWeight:600,padding:0,textAlign:"left"}}>
            {showAllLogs?`▲ Ocultar (${t.log.length-1} más)`:`▼ Ver todos (${t.log.length} comentarios)`}
          </button>
        )}
      </div>
    );
  }

  function Section({icon,title,tasks,accentColor,headerStyle}) {
    if(tasks.length===0)return null;
    return(
      <div className="inf-section">
        <div className="inf-section-header" style={headerStyle||{}}>
          <span className="inf-section-icon">{icon}</span>
          <span className="inf-section-title" style={headerStyle?{color:headerStyle.borderBottomColor}:{}}>{title}</span>
          <span className="inf-section-count" style={headerStyle?{background:"rgba(192,57,43,0.1)",color:"var(--red)"}:{}}>{tasks.length}</span>
        </div>
        {tasks.map((t,i)=><TaskCard key={i} t={t} accentColor={accentColor}/>)}
      </div>
    );
  }

  const projShortName=project.name.split(" - ").slice(1).join(" - ")||project.name;

  return(
    <div className="inf-wrap">
      <div className="inf-header" style={{borderBottomColor:project.color}}>
        <div className="inf-header-top">
          <div>
            <div className="inf-eyebrow" style={{color:project.color}}>Informe de Estado</div>
            <div className="inf-title">{projShortName}</div>
            <div className="inf-subtitle">{dateStr} · {project.name.split(" - ")[0]}</div>
          </div>
          <div className="inf-controls" style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
            {allResponsables.length>1&&(
              <FilterMulti
                placeholder="Todos los responsables"
                options={allResponsables.map(r=>({val:r,label:r}))}
                selected={filterResp} onChange={setFilterResp}
              />
            )}
            <FilterMulti
              placeholder="Todos los estados"
              options={STATUS_OPTS.map(s=>({val:s,label:s}))}
              selected={filterStatus} onChange={setFilterStatus}
            />
            <FilterMulti
              placeholder="T / R"
              options={[{val:"T",label:"T — Tarea",dot:"#1a7a4a"},{val:"R",label:"R — Restricción",dot:"#c0392b"}]}
              selected={filterTipo} onChange={setFilterTipo}
            />
            {(filterResp.length>0||filterTipo.length>0||filterStatus.length>0)&&(
              <button className="btn btn-ghost btn-xs" onClick={()=>{setFilterResp([]);setFilterTipo([]);setFilterStatus([]);}}>✕</button>
            )}
            <button className={"inf-toggle"+(soloIS?" on":"")} onClick={()=>setSoloIS(s=>!s)}>
              📋 {soloIS?"Solo IS":"Todo el equipo"}
            </button>
          </div>
        </div>
        <div className="inf-kpis">
          <div className="inf-kpi"><div className="inf-kpi-val" style={{color:"var(--teal)"}}>{total}</div><div className="inf-kpi-label">Tareas críticas</div></div>
          <div className="inf-kpi"><div className="inf-kpi-val" style={{color:pctColor}}>{pct}%</div><div className="inf-kpi-label">Avance críticas</div></div>
          <div className="inf-kpi"><div className="inf-kpi-val" style={{color:"var(--green)"}}>{done}</div><div className="inf-kpi-label">Completadas</div></div>
          <div className="inf-kpi"><div className="inf-kpi-val" style={{color:"var(--teal)"}}>{enCurso.length}</div><div className="inf-kpi-label">En curso</div></div>
          <div className="inf-kpi"><div className="inf-kpi-val" style={{color:"var(--red)"}}>{atrasadas.length}</div><div className="inf-kpi-label">Atrasadas</div></div>
          <div className="inf-kpi"><div className="inf-kpi-val" style={{color:"var(--ink3)"}}>{pendientes.length}</div><div className="inf-kpi-label">Pendientes</div></div>
        </div>
        <div className="inf-progress-bar"><div className="inf-progress-fill" style={{width:pct+"%",background:pctColor}}/></div>
      </div>

      {(()=>{
        const sevenDays=new Date();sevenDays.setDate(sevenDays.getDate()+7);
        const sevenStr=sevenDays.toISOString().slice(0,10);
        const completedRecent=t=>t.estado==="Completado"&&t.fechaTerminoR&&t.fechaTerminoR>=threeWeeksAgoStr;
        const showable=allTasks.filter(t=>t.estado!=="Completado"||completedRecent(t));
        if(showable.length===0)return(
          <div className="inf-tbl-empty">
            {(soloIS||filterResp.length>0||filterTipo.length>0||filterStatus.length>0)?"No hay tareas críticas (prioridad Alta/Media) que cumplan los filtros aplicados.":"No hay tareas críticas (prioridad Alta/Media) para mostrar en este proyecto."}
          </div>
        );
        const byAct=new Map();
        (project.activities||[]).forEach(a=>byAct.set(a.id,{actName:a.name,tasks:[]}));
        showable.forEach(t=>{
          const act=(project.activities||[]).find(a=>a.tasks.some(x=>x.id===t.id));
          if(!act)return;
          if(!byAct.has(act.id))byAct.set(act.id,{actName:act.name,tasks:[]});
          byAct.get(act.id).tasks.push(t);
        });
        const urgencyRank=t=>{
          const isOver=t.estado!=="Completado"&&t.fechaTerminoE&&t.fechaTerminoE<today;
          const isDone=t.estado==="Completado";
          if(isOver)return 0;
          if(isDone)return 2;
          return 1;
        };
        const groups=[...byAct.values()].filter(g=>g.tasks.length>0).map(g=>{
          g.tasks.sort((a,b)=>{
            const ra=urgencyRank(a),rb=urgencyRank(b);
            if(ra!==rb)return ra-rb;
            return(a.fechaTerminoE||"zzzz").localeCompare(b.fechaTerminoE||"zzzz");
          });
          return g;
        });
        return(
          <div className="inf-tbl">
            <div className="inf-tbl-head">
              <div>Tarea / Restricción</div>
              <div style={{textAlign:"center"}}>Tipo</div>
              <div>Descripción</div>
              <div>Responsable</div>
              <div>Fecha Término (E)</div>
              <div>Estado</div>
            </div>
            {groups.map(g=><InfActGroup key={g.actName} group={g} today={today} sevenStr={sevenStr} fmtDate={fmtDate} daysDiff={daysDiff}/>)}
          </div>
        );
      })()}
    </div>
  );
}

function InfActGroup({group,today,sevenStr,fmtDate,daysDiff}) {
  const [open,setOpen]=React.useState(true);
  const overdueCount=group.tasks.filter(t=>t.estado!=="Completado"&&t.fechaTerminoE&&t.fechaTerminoE<today).length;
  return(
    <div className="inf-act-group">
      <div className="inf-act-hdr" onClick={()=>setOpen(o=>!o)}>
        <span className={"inf-act-arrow"+(open?" open":"")}>▶</span>
        <span className="inf-act-name">{group.actName}</span>
        <span className="inf-act-count">{group.tasks.length} {group.tasks.length===1?"tarea":"tareas"}</span>
        {overdueCount>0&&<span className="inf-act-overdue">⏱ {overdueCount} atrasada{overdueCount===1?"":"s"}</span>}
      </div>
      {open&&group.tasks.map(t=><InfTaskRow key={t.id} t={t} today={today} sevenStr={sevenStr} fmtDate={fmtDate} daysDiff={daysDiff}/>)}
    </div>
  );
}

function InfTaskRow({t,today,sevenStr,fmtDate,daysDiff}) {
  const [expand,setExpand]=React.useState(false);
  const isOver=t.estado!=="Completado"&&t.fechaTerminoE&&t.fechaTerminoE<today;
  const isSoon=!isOver&&t.estado!=="Completado"&&t.fechaTerminoE&&t.fechaTerminoE<=sevenStr&&t.fechaTerminoE>=today;
  const isDone=t.estado==="Completado";
  const prio=normPrio(t.prioridad);
  const logs=t.log||[];
  const lastLog=logs.length>0?logs[logs.length-1]:null;
  const hasMore=logs.length>1;
  const rowCls="inf-tbl-row"+(isOver?" overdue":isSoon?" soon":"");
  const tipoCls=t.tipo==="T"?"inf-tbl-tipo-T":t.tipo==="R"?"inf-tbl-tipo-R":"inf-tbl-tipo-empty";
  return(
    <>
      <div className={rowCls} style={{borderLeftColor:PRIO_COLORS[prio]}}>
        <div className="inf-tbl-tarea">{t.tarea}</div>
        <div className="inf-tbl-tipo"><span className={"inf-tbl-tipo-badge "+tipoCls}>{t.tipo||"—"}</span></div>
        <div className="inf-tbl-desc">
          {lastLog?(
            <>
              {lastLog.date&&<span className="inf-tbl-desc-date">{fmtDate(lastLog.date)}</span>}
              <span>{lastLog.text}</span>
              {hasMore&&<button className="inf-tbl-desc-more" onClick={e=>{e.stopPropagation();setExpand(v=>!v);}}>{expand?`▲ Ocultar (${logs.length-1} más)`:`▼ Ver ${logs.length-1} comentario${logs.length-1===1?"":"s"} más`}</button>}
            </>
          ):<span className="inf-tbl-desc-empty">Sin bitácora</span>}
        </div>
        <div className="inf-tbl-resp">{t.responsable||<span style={{color:"var(--ink3)",fontWeight:500}}>—</span>}</div>
        <div>
          {isDone&&t.fechaTerminoR?(
            <><span className="inf-tbl-date" style={{color:"var(--green)",fontWeight:700}}>✓ {fmtDate(t.fechaTerminoR)}</span><span className="inf-tbl-date-sub">Compl. real</span></>
          ):t.fechaTerminoE?(
            <><span className={"inf-tbl-date"+(isOver?" overdue":isSoon?" soon":"")}>{fmtDate(t.fechaTerminoE)}</span>{isOver&&<span className="inf-tbl-date-sub">Vencida hace {daysDiff(t.fechaTerminoE)}</span>}{isSoon&&<span className="inf-tbl-date-sub">Próxima</span>}</>
          ):<span style={{color:"var(--ink3)"}}>—</span>}
        </div>
        <div><span className={"inf-tbl-estado-pill "+STATUS_CLASS[t.estado]}>{t.estado}</span></div>
      </div>
      {expand&&hasMore&&(
        <div className="inf-tbl-logs">
          {[...logs].reverse().slice(1).map((l,i)=>(
            <div key={i} className="inf-tbl-logs-item">
              {l.date&&<span className="inf-tbl-desc-date">{fmtDate(l.date)}</span>}
              {l.text}
            </div>
          ))}
        </div>
      )}
    </>
  );
}

function DashboardView({projects, onSelectProject}) {
  const [filterCity, setFilterCity] = useState("all");
  const [selectedProjs, setSelectedProjs] = useState([]);
  const [filterResp, setFilterResp] = useState("all");
  const today = new Date().toISOString().slice(0,10);
  const cities = [...new Set(projects.map(p=>p.name.split(" - ")[0].trim()))].sort();

  const cityFiltered = filterCity==="all" ? projects : projects.filter(p=>p.name.startsWith(filterCity));
  const projOptions = cityFiltered.map(p=>({id:p.id,label:p.name.split(" - ").slice(1).join(" - ")||p.name,color:p.color}));
  const filtered = selectedProjs.length===0 ? cityFiltered : cityFiltered.filter(p=>selectedProjs.includes(p.id));

  // When city changes, reset project selection
  React.useEffect(()=>setSelectedProjs([]),[filterCity]);

  const allTasksRaw = filtered.flatMap(p=>(p.activities||[]).flatMap(a=>a.tasks.map(t=>({...t,projName:p.name,projId:p.id,projColor:p.color,actName:a.name}))));
  const allResponsables = [...new Set(allTasksRaw.map(t=>t.responsable).filter(Boolean))].sort();
  const allTasks = filterResp==="all" ? allTasksRaw : allTasksRaw.filter(t=>t.responsable===filterResp);
  const done = allTasks.filter(t=>t.estado==="Completado").length;
  const inProgress = allTasks.filter(t=>t.estado==="En Proceso").length;
  const blocked = allTasks.filter(t=>t.estado==="Bloqueado").length;
  const pendingAll = allTasks.filter(t=>t.estado==="Pendiente");
  const pendingOverdue = pendingAll.filter(t=>t.fechaTerminoE&&t.fechaTerminoE<today).length;
  const pendingOnTime = pendingAll.length - pendingOverdue;
  const pending = pendingAll.length;
  const overdueTasks = allTasks.filter(t=>t.estado!=="Completado"&&t.fechaTerminoE&&t.fechaTerminoE<today)
    .sort((a,b)=>a.fechaTerminoE.localeCompare(b.fechaTerminoE)).slice(0,12);
  const globalPct = allTasks.length>0?Math.round(done/allTasks.length*100):0;

  // Upcoming tasks: due in next 30 days, not completed
  const in30 = new Date(); in30.setDate(in30.getDate()+30);
  const in30str = in30.toISOString().slice(0,10);
  const upcomingTasks = allTasks.filter(t=>t.estado!=="Completado"&&t.fechaTerminoE&&t.fechaTerminoE>=today&&t.fechaTerminoE<=in30str)
    .sort((a,b)=>a.fechaTerminoE.localeCompare(b.fechaTerminoE)).slice(0,10);

  // Responsables with pending/in-process tasks
  const respMap = {};
  allTasks.filter(t=>t.estado!=="Completado"&&t.estado!=="Bloqueado"&&t.responsable).forEach(t=>{
    respMap[t.responsable]=(respMap[t.responsable]||0)+1;
  });
  const respList = Object.entries(respMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxResp = respList.length>0?respList[0][1]:1;

  const projSorted = [...filtered].map(p=>{
    const tasks=(p.activities||[]).flatMap(a=>a.tasks);
    const d=tasks.filter(t=>t.estado==="Completado").length;
    const pct=tasks.length>0?Math.round(d/tasks.length*100):0;
    return {...p, pct, taskCount:tasks.length};
  }).sort((a,b)=>b.pct-a.pct);

  const daysDiff = d => {
    const diff=Math.floor((new Date(today)-new Date(d))/(1000*60*60*24));
    return diff===0?"hoy":diff===1?"1 día":diff+" días";
  };
  const daysUntil = d => {
    const diff=Math.floor((new Date(d)-new Date(today))/(1000*60*60*24));
    return diff===0?"hoy":diff===1?"mañana":"en "+diff+" días";
  };
  const fmtShort = d => { if(!d)return"—"; const[y,m,day]=d.split("-"); return `${day}/${m}`; };

  return(
    <div className="dash-wrap">
      <div className="dash-filter-row">
        <span style={{fontSize:13,fontWeight:700,color:"var(--ink2)"}}>Dashboard General</span>
        <select value={filterCity} onChange={e=>setFilterCity(e.target.value)}>
          <option value="all">Todas las ciudades</option>
          {cities.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
        <MultiSelect options={projOptions} selected={selectedProjs} onChange={setSelectedProjs} placeholder="Todos los proyectos"/>
        <select value={filterResp} onChange={e=>setFilterResp(e.target.value)}>
          <option value="all">Todos los responsables</option>
          {allResponsables.map(r=><option key={r} value={r}>{r}</option>)}
        </select>
        {(filterCity!=="all"||selectedProjs.length>0||filterResp!=="all")&&(
          <button className="btn btn-ghost btn-sm" onClick={()=>{setFilterCity("all");setSelectedProjs([]);setFilterResp("all");}}>✕ Limpiar</button>
        )}
        <span style={{fontSize:11,color:"var(--ink3)",marginLeft:"auto"}}>{filtered.length} proyectos · {allTasks.length} tareas</span>
      </div>

      <div className="dash-kpi-row">
        <div className="dash-kpi" style={{borderTopColor:"var(--teal)"}}>
          <div className="dash-kpi-val">{filtered.length}</div>
          <div className="dash-kpi-label">Proyectos activos</div>
        </div>
        <div className="dash-kpi" style={{borderTopColor:"var(--green)"}}>
          <div className="dash-kpi-val" style={{color:"var(--green)"}}>{globalPct}%</div>
          <div className="dash-kpi-label">Avance global</div>
          <div className="dash-kpi-sub">{done} de {allTasks.length} tareas</div>
        </div>
        <div className="dash-kpi" style={{borderTopColor:"var(--amber)"}}>
          <div className="dash-kpi-val" style={{color:"var(--amber)"}}>{inProgress}</div>
          <div className="dash-kpi-label">En proceso</div>
        </div>
        <div className="dash-kpi" style={{borderTopColor:"var(--red)"}}>
          <div className="dash-kpi-val" style={{color:"var(--red)"}}>{overdueTasks.length}</div>
          <div className="dash-kpi-label">Tareas atrasadas</div>
          {blocked>0&&<div className="dash-kpi-sub">{blocked} bloqueadas</div>}
        </div>
      </div>

      <div className="dash-row">
        <div className="dash-card">
          <h4>Estado de tareas</h4>
          <DonutChart data={[
            {label:"Completado",val:done,color:"#1a7a4a"},
            {label:"En Proceso",val:inProgress,color:"#1a5f6e"},
            {label:"Pendiente — a tiempo",val:pendingOnTime,color:"#8a8780"},
            {label:"Pendiente — atrasado",val:pendingOverdue,color:"#c0392b"},
            {label:"Bloqueado",val:blocked,color:"#6d2d2d"},
          ]}/>
          {respList.length>0&&(<>
            <div style={{marginTop:18,paddingTop:14,borderTop:"1px solid var(--line)"}}>
              <div style={{fontSize:12,fontWeight:700,color:"var(--ink2)",marginBottom:10}}>Responsables — tareas pendientes</div>
              {respList.map(([name,count])=>(
                <div key={name} className="dash-resp-row">
                  <div className="dash-resp-name" title={name}>{name.split(" ")[0]}</div>
                  <div className="dash-resp-bar-wrap"><div className="dash-resp-bar-fill" style={{width:(count/maxResp*100)+"%"}}/></div>
                  <div className="dash-resp-count">{count}</div>
                </div>
              ))}
            </div>
          </>)}
        </div>
        <div className="dash-card">
          <h4>Tareas más atrasadas</h4>
          {overdueTasks.length===0?<p style={{color:"var(--ink3)",fontSize:12,textAlign:"center",padding:20}}>✅ Sin tareas atrasadas</p>:
          overdueTasks.map((t,i)=>(
            <div key={i} className="dash-overdue-row" onClick={()=>onSelectProject(t.projId)}>
              <span className="dash-overdue-days">{daysDiff(t.fechaTerminoE)}</span>
              <div className="dash-overdue-info">
                <div className="dash-overdue-task">{t.tarea}</div>
                <div className="dash-overdue-proj">{t.projName.split(" - ").slice(1).join(" - ")||t.projName} · {t.actName} · {fmtShort(t.fechaTerminoE)}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="dash-upcoming-grid">
        <div className="dash-card">
          <h4>⏳ Próximas a vencer (30 días)</h4>
          {upcomingTasks.length===0?<p style={{color:"var(--ink3)",fontSize:12,textAlign:"center",padding:20}}>Sin tareas con vencimiento próximo</p>:
          upcomingTasks.map((t,i)=>{
            const diff=Math.floor((new Date(t.fechaTerminoE)-new Date(today))/(1000*60*60*24));
            const bg=diff<=7?"var(--red-lt)":diff<=14?"rgba(230,160,0,0.12)":"rgba(20,160,180,0.1)";
            const col=diff<=7?"var(--red)":diff<=14?"var(--amber)":"var(--teal)";
            return(
              <div key={i} className="dash-upcoming-row" onClick={()=>onSelectProject(t.projId)}>
                <span className="dash-upcoming-badge" style={{background:bg,color:col}}>{daysUntil(t.fechaTerminoE)}</span>
                <div className="dash-overdue-info">
                  <div className="dash-overdue-task">{t.tarea}</div>
                  <div className="dash-overdue-proj">{t.projName.split(" - ").slice(1).join(" - ")||t.projName} · {fmtShort(t.fechaTerminoE)}</div>
                </div>
              </div>
            );
          })}
        </div>
        <div className="dash-card">
          <h4>📋 Informe Socios — pendientes</h4>
          {(()=>{
            const isTasks=allTasks.filter(t=>t.informeSocio&&t.estado!=="Completado").sort((a,b)=>a.fechaTerminoE?.localeCompare(b.fechaTerminoE||"")||0).slice(0,10);
            return isTasks.length===0?<p style={{color:"var(--ink3)",fontSize:12,textAlign:"center",padding:20}}>✅ Sin tareas IS pendientes</p>:
            isTasks.map((t,i)=>{
              const isOverdueIS=t.fechaTerminoE&&t.fechaTerminoE<today;
              const badge=isOverdueIS?{bg:"var(--red-lt)",col:"var(--red)",label:"⚠ Atrasado"}:{bg:"rgba(20,160,180,0.12)",col:"var(--teal)",label:t.estado};
              return(
              <div key={i} className="dash-upcoming-row" onClick={()=>onSelectProject(t.projId)}>
                <span className="dash-upcoming-badge" style={{background:badge.bg,color:badge.col}}>{badge.label}</span>
                <div className="dash-overdue-info">
                  <div className="dash-overdue-task">{t.tarea}</div>
                  <div className="dash-overdue-proj">{t.projName.split(" - ").slice(1).join(" - ")||t.projName} · {fmtShort(t.fechaTerminoE)}</div>
                </div>
              </div>
            );});
          })()}
        </div>
      </div>

      <div className="dash-card">
        <h4>Avance por proyecto</h4>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:"8px 20px"}}>
          {projSorted.map(p=>{
            const color=p.pct===100?"var(--green)":p.pct>=50?"var(--teal)":"var(--amber)";
            return(
              <div key={p.id} className="dash-proj-row" onClick={()=>onSelectProject(p.id)}>
                <div className="dash-proj-dot" style={{background:p.color}}/>
                <div className="dash-proj-name" title={p.name}>{p.name.includes(" - ")?p.name.split(" - ").slice(1).join(" - "):p.name}</div>
                <div className="dash-proj-bar-wrap"><div className="dash-proj-bar-fill" style={{width:p.pct+"%",background:color}}/></div>
                <div className="dash-proj-pct" style={{color}}>{p.pct}%</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── KANBAN VIEW ──────────────────────────────────────────────────────────────
const KANBAN_COLS = [
  {id:"Pendiente",label:"Pendiente",color:"#8a8780"},
  {id:"En Proceso",label:"En Proceso",color:"#1a5f6e"},
  {id:"Completado",label:"Completado",color:"#1a7a4a"},
  {id:"Bloqueado",label:"Bloqueado",color:"#c0392b"},
];
const PRIO_COLORS={1:"#c0392b",2:"#b7620a",3:"#8a8780"};
const PRIO_LABELS={1:"Alta",2:"Media",3:"Baja"};

function KanbanView({project, onUpdateTask, onAuditLog}) {
  const [dragging, setDragging] = useState(null); // {taskId, actId}
  const [dragOver, setDragOver] = useState(null);
  const today = new Date().toISOString().slice(0,10);

  const allTasks = (project.activities||[]).flatMap(a=>
    a.tasks.map(t=>({...t, actId:a.id, actName:a.name}))
  );

  const tasksByStatus = KANBAN_COLS.reduce((acc,col)=>{
    acc[col.id]=allTasks.filter(t=>t.estado===col.id);
    return acc;
  },{});

  const handleDragStart=(e,taskId,actId)=>{
    setDragging({taskId,actId});
    e.dataTransfer.effectAllowed="move";
  };
  const handleDragOver=(e,colId)=>{e.preventDefault();setDragOver(colId);};
  const handleDrop=(e,newStatus)=>{
    e.preventDefault();
    if(!dragging)return;
    const task=allTasks.find(t=>t.id===dragging.taskId);
    const updates={estado:newStatus};
    if(newStatus==="Completado"&&!task.fechaTerminoR) updates.fechaTerminoR=today;
    onUpdateTask(dragging.actId, {...task,...updates}, `Tarea "${task.tarea}" → ${newStatus}`);
    if(onAuditLog)onAuditLog("tarea_modificada",`Tarea "${task.tarea}" movida a ${newStatus}`);
    setDragging(null);setDragOver(null);
  };

  return(
    <div className="kanban-wrap">
      {KANBAN_COLS.map(col=>(
        <div key={col.id} className={"kanban-col"+(dragOver===col.id?" drag-over":"")}
          onDragOver={e=>handleDragOver(e,col.id)}
          onDragLeave={()=>setDragOver(null)}
          onDrop={e=>handleDrop(e,col.id)}>
          <div className="kanban-col-header">
            <span className="kanban-col-title" style={{color:col.color}}>{col.label}</span>
            <span className="kanban-col-count">{tasksByStatus[col.id].length}</span>
          </div>
          {tasksByStatus[col.id].map(t=>{
            const overdue=t.estado!=="Completado"&&t.fechaTerminoE&&t.fechaTerminoE<today;
            return(
              <div key={t.id} className={"kanban-card"+(dragging?.taskId===t.id?" dragging":"")}
                style={{borderLeftColor:col.color}}
                draggable
                onDragStart={e=>handleDragStart(e,t.id,t.actId)}>
                <div className="kanban-card-task">{t.tarea}</div>
                <div className="kanban-card-act">{t.actName}</div>
                <div className="kanban-card-footer">
                  <span className="kanban-card-prio" style={{background:PRIO_COLORS[normPrio(t.prioridad)]+"22",color:PRIO_COLORS[normPrio(t.prioridad)]}}>P{normPrio(t.prioridad)} {PRIO_LABELS[normPrio(t.prioridad)]}</span>
                  {t.responsable&&<span className="kanban-card-resp">👤 {t.responsable.split(" ")[0]}</span>}
                  {t.fechaTerminoE&&<span className="kanban-card-date">{overdue?"⚠ ":""}{t.fechaTerminoE.slice(5).replace("-","/")}</span>}
                  {t.informeSocio&&<span className="kanban-card-is">📋 IS</span>}
                </div>
              </div>
            );
          })}
          {tasksByStatus[col.id].length===0&&(
            <div style={{textAlign:"center",color:"var(--ink3)",fontSize:11,padding:"20px 0",fontStyle:"italic"}}>Sin tareas</div>
          )}
        </div>
      ))}
    </div>
  );
}

function MobileProjectList({projects, onSelect}) {

    !search || p.name.toLowerCase().includes(search.toLowerCase())
  );

    <div>

          placeholder="Buscar proyecto..."
          value={search}
          onChange={e=>setSearch(e.target.value)}

        const tasks = (p.activities||[]).flatMap(a=>a.tasks);
        const done = tasks.filter(t=>t.estado==="Completado").length;

        const color = pct===100?"#1a7a4a":pct>=50?"#1a5f6e":"#b7620a";
        const overdue = tasks.filter(t=>t.estado!=="Completado"&&t.fechaTerminoE&&t.fechaTerminoE<today)
          .sort((a,b)=>a.fechaTerminoE.localeCompare(b.fechaTerminoE))[0];

              <div className="mobile-proj-card-name">{shortName}</div>
              <span style={{fontSize:11,color:"var(--ink3)",flexShrink:0}}>{tasks.length} tareas</span>
            </div>
            <div className="mobile-proj-card-footer">
              <span className="mobile-proj-pct">{pct}%</span>
              <div className="mobile-proj-bar">
                <div className="mobile-proj-bar-fill" style={{width:pct+"%",background:color}}/>
              </div>

            </div>
            {overdue&&<div className="mobile-proj-overdue">⚠ Atrasada: {overdue.tarea}</div>}
          </div>
        );

    </div>
  );
